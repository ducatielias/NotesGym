<style>
  /* ===== ESTILOS DEL CONTENIDO ===== */
  .detalle-contenido {
    display: flex;
    flex-direction: column;
    height: 100%;
    flex: 1;
    min-height: 0;
    overflow: hidden;
    
  }
  .detalle-cabecera {
    flex-shrink: 0;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(43, 37, 31, 0.1);
  }
  .detalle-imagen {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 16px;
    border: var(--border-width) solid var(--text-dark);
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  .detalle-grupo {
    margin-bottom: 8px;
  }
  .detalle-grupo strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  .detalle-grupo p {
    margin: 0;
    font-size: 15px;
  }
  .detalle-descripcion-wrapper {
    flex: 1;
    min-height: 0;
    margin-top: 12px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-right: 4px;
  }
  .detalle-descripcion-wrapper strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 4px;
  }
  .detalle-descripcion-wrapper p {
    margin: 0;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.85;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .detalle-descripcion-wrapper::-webkit-scrollbar {
    width: 4px;
  }
  .detalle-descripcion-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }
  .detalle-descripcion-wrapper::-webkit-scrollbar-thumb {
    background: var(--text-dark);
    border-radius: 4px;
  }

  /* ===== ESTILOS DEL MODAL (pantalla completa) ===== */
  .modal-detalle-ejercicio .modal-overlay {
    padding: 0 !important;
  }
  .modal-detalle-ejercicio .modal-box {
    width: 100vw !important;
    max-width: 100vw !important;
    height: 100vh !important;
    max-height: 100vh !important;
    border-radius: 0 !important;
    margin: 0 !important;
    padding: 20px 16px 80px 16px !important;
    display: grid !important;
    grid-template-rows: auto 1fr !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
    box-shadow: none !important;
    border: none !important;
    
    background: #f5edd8;
  }
  .modal-detalle-ejercicio .modal-box > div {
    display: flex !important;
    flex-direction: column !important;
    min-height: 0 !important;
    overflow: hidden !important;
    height: 100% !important;
  }

  /* ===== BOTONES FIJOS ===== */
  .detalle-botones-fijos {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 21000;
    display: flex;
    gap: 10px;
    padding: 0 16px;
    width: auto;
    max-width: 100%;
    box-sizing: border-box;
    justify-content: center;
    background: transparent;
    pointer-events: none;
  }
  .detalle-botones-fijos .modal-boton {
    pointer-events: auto;
    flex: 0 1 auto;
    padding: 10px 18px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--text-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    color: var(--text-dark);
    font-family: 'Space Mono', monospace;
  }
  .detalle-botones-fijos .modal-boton:active {
    transform: scale(0.95);
    box-shadow: 0 1px 0 var(--text-dark);
  }
  .detalle-botones-fijos .modal-boton.primario {
    background-color: var(--text-dark);
    color: var(--bg-card);
  }
  @media (max-width: 400px) {
    .detalle-botones-fijos {
      width: 90%;
      gap: 8px;
    }
    .detalle-botones-fijos .modal-boton {
      flex: 1;
      justify-content: center;
      padding: 7px 4px;/*padding: 14px 8px;*/
      font-size: 20px;
    }
    .detalle-botones-fijos .btn-text {
      display: none;
    }
  }
</style>

<div class="detalle-contenido">
  <div class="detalle-cabecera">
    <div id="detalleImagenContainer"></div>
    <div class="detalle-grupo">
      <strong>Grupo muscular</strong>
      <p id="detalleGrupo"></p>
    </div>
  </div>
  <div class="detalle-descripcion-wrapper" id="detalleDescripcionWrapper">
    <strong>Descripción</strong>
    <p id="detalleDescripcion"></p>
  </div>
</div>

<script>
  // ============================================================
  //  INICIALIZADOR DEL DETALLE
  // ============================================================
  window.initDetalle = function(ejercicio, modalRef) {
    // Rellenar datos
    const imgContainer = document.getElementById('detalleImagenContainer');
    if (imgContainer) {
      const imagen = ejercicio.imagen && ejercicio.imagen.trim() !== '' ? ejercicio.imagen : null;
      imgContainer.innerHTML = imagen
        ? `<img src="${imagen}" alt="${ejercicio.nombre}" class="detalle-imagen" loading="lazy">`
        : '';
    }

    document.getElementById('detalleGrupo').textContent = ejercicio.grupo;
    document.getElementById('detalleDescripcion').textContent = ejercicio.descripcion || 'Sin descripción.';

    // ===== Botones fijos =====
    const container = document.createElement('div');
    container.className = 'detalle-botones-fijos';
    container.id = 'detalleBotonesFijos';

    // Cerrar
    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-boton';
    closeBtn.title = 'Cerrar'; 
    closeBtn.innerHTML = `✖ <span class="btn-text">Cerrar</span>`;
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
      container.remove();
    });
    container.appendChild(closeBtn);

    // Reproducir (si hay vídeo)
    if (ejercicio.video && ejercicio.video.trim() !== '') {
      const playBtn = document.createElement('button');
      playBtn.className = 'modal-boton primario';
      playBtn.title = 'Reproducir vídeo'; 
      playBtn.innerHTML = `▶ <span class="btn-text">Reproducir</span>`;
      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open(ejercicio.video, '_blank');
      });
      container.appendChild(playBtn);
    }

    // Editar
    const editBtn = document.createElement('button');
    editBtn.className = 'modal-boton primario';
    editBtn.title = 'Editar';
    editBtn.innerHTML = `✏️ <span class="btn-text">Editar</span>`;
    editBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
      container.remove();
      setTimeout(() => window.abrirFormularioEdicion(ejercicio), 200);
    });
    container.appendChild(editBtn);

    document.body.appendChild(container);

    // Asegurar limpieza al cerrar el modal
    const originalCerrar = modalRef.cerrar;
    modalRef.cerrar = function() {
      originalCerrar();
      if (container.parentNode) container.remove();
    };
  };
</script>
