<style>
  /* ===== ESTILOS DEL CONTENIDO ===== */
  .detalle-contenido {
    display: flex;
    flex-direction: column;
    min-height: 100%;         /* Ocupa toda la altura del modal */
    height: 100%;
    overflow-y: auto;         /* Scroll en el contenedor principal */
    padding: 0 0 10px 0;      /* Espacio inferior para separar del borde */
    box-sizing: border-box;
    flex: 1;
  }
  
  .detalle-cabecera {
    flex-shrink: 0;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(43, 37, 31, 0.1);
  }
  
  .detalle-imagen {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 16px;
    border: var(--border-width) solid var(--text-dark);
    margin-bottom: 12px;
    box-sizing: border-box;
  }
  
  .detalle-grupo {
    margin-bottom: 8px;
  }
  
  .detalle-grupo strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  
  .detalle-grupo p {
    margin: 0;
    font-size: 15px;
  }
  
  .detalle-descripcion-wrapper {
    flex: 1;                 /* Ocupa el espacio disponible */
    margin-top: 12px;
    padding-right: 4px;
    overflow-y: visible;     /* Sin scroll interno */
  }
  
  .detalle-descripcion-wrapper strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 4px;
  }
  
  .detalle-descripcion-wrapper p {
    margin: 0;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.85;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  
  .detalle-descripcion-wrapper p a {
    color: var(--accent-blue);
    text-decoration: underline;
    word-break: break-all;
  }
  
  /* ===== CONTENEDOR DE BOTONES (ahora en el flujo) ===== */
  .detalle-botones-flujo {
    margin-top: auto;          /* Empuja los botones al final si el contenido es corto */
    padding-top: 16px;
    padding-bottom: 4px;
    border-top: 2px solid rgba(43, 37, 31, 0.15);  /* Separador opcional */
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    flex-shrink: 0;           /* Evita que se encoja */
    background-color: var(--bg-card);  /* Fondo para cubrir contenido subyacente */
  }
  
  .detalle-botones-flujo .modal-boton {
    flex: 1 1 auto;
    min-width: 80px;
    padding: 10px 10px;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--text-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    color: var(--text-dark);
    font-family: 'Space Mono', monospace;
    text-align: center;
  }
  
  .detalle-botones-flujo .modal-boton:active {
    transform: scale(0.95);
    box-shadow: 0 1px 0 var(--text-dark);
  }
  
  .detalle-botones-flujo .modal-boton.primario {
    background-color: var(--text-dark);
    color: var(--bg-card);
  }
  
  @media (max-width: 400px) {
    .detalle-botones-flujo .modal-boton {
      flex: 1 1 0;
      padding: 10px 8px;
      font-size: 14px;
    }
    .detalle-botones-flujo .btn-text {
      display: none; /* Puedes ocultar el texto en móviles si quieres, pero lo dejamos visible */
    }
  }
  
  /* ===== ESTILOS DEL MODAL (pantalla completa) ===== */
  .modal-detalle-ejercicio .modal-overlay {
    padding: 0 !important;
  }
  
  .modal-detalle-ejercicio .modal-box {
    width: 100vw !important;
    max-width: 90vw !important;
    height: 100vh !important;
    max-height: 97vh !important;
    border-radius: var(--card-radius) !important;
    margin: 0 !important;
    padding: 12px 12px 16px 12px !important;
    display: grid !important;
    grid-template-rows: auto 1fr !important;
    overflow: hidden !important;
    box-sizing: border-box !important;
    box-shadow: 0 var(--shadow-offset) 0 var(--text-dark) !important;
    border: var(--border-width) solid var(--text-dark) !important;
    background-color: var(--bg-card);
    position: relative;
  }
  
  .modal-detalle-ejercicio .modal-box > div {
    display: flex !important;
    flex-direction: column !important;
    min-height: 0 !important;
    overflow: hidden !important;
    height: 100% !important;
  }
</style>

<div class="detalle-contenido">
  <div class="detalle-cabecera">
    <div id="detalleImagenContainer"></div>
    <div class="detalle-grupo">
      <strong>Grupo muscular</strong>
      <p id="detalleGrupo"></p>
    </div>
  </div>
  <div class="detalle-descripcion-wrapper" id="detalleDescripcionWrapper">
    <strong>Descripción</strong>
    <p id="detalleDescripcion"></p>
  </div>
  <!-- Los botones se insertarán aquí mediante JavaScript, al final del flujo -->
</div>

<script>
  // ============================================================
  //  FUNCIÓN PARA CONVERTIR URLs EN ENLACES
  // ============================================================
  function convertirUrlsEnEnlaces(texto) {
    const urlRegex = /(https?:\/\/[^\s]+)/g;
    return texto.replace(urlRegex, function(url) {
      const urlEscapada = url.replace(/&/g, '&amp;').replace(/"/g, '&quot;');
      return `<a href="${urlEscapada}" target="_blank" rel="noopener noreferrer">${urlEscapada}</a>`;
    });
  }

  // ============================================================
  //  INICIALIZADOR DEL DETALLE
  // ============================================================
  window.initDetalle = function(ejercicio, modalRef) {
    // Rellenar datos
    const imgContainer = document.getElementById('detalleImagenContainer');
    if (imgContainer) {
      const imagen = ejercicio.imagen && ejercicio.imagen.trim() !== '' ? ejercicio.imagen : null;
      imgContainer.innerHTML = imagen
        ? `<img src="${imagen}" alt="${ejercicio.nombre}" class="detalle-imagen" loading="lazy">`
        : '';
    }

    document.getElementById('detalleGrupo').textContent = ejercicio.grupo;

    const descripcionElement = document.getElementById('detalleDescripcion');
    let descripcionTexto = ejercicio.descripcion || 'Sin descripción.';
    descripcionElement.innerHTML = convertirUrlsEnEnlaces(descripcionTexto);

    // ===== Crear contenedor de botones dentro del flujo =====
    const detalleContenedor = document.querySelector('.detalle-contenido');
    if (!detalleContenedor) return;

    // Eliminar contenedor de botones previo si existe (por si se reabre)
    const btnContainerExistente = detalleContenedor.querySelector('.detalle-botones-flujo');
    if (btnContainerExistente) btnContainerExistente.remove();

    // Crear nuevo contenedor
    const container = document.createElement('div');
    container.className = 'detalle-botones-flujo';
    container.id = 'detalleBotonesFlujo';

    // Botón Cerrar
    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-boton';
    closeBtn.title = 'Cerrar';
    closeBtn.innerHTML = `✖ <span class="btn-text">Cerrar</span>`;
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
    });
    container.appendChild(closeBtn);

    // Botón Reproducir (si hay vídeo)
    if (ejercicio.video && ejercicio.video.trim() !== '') {
      const playBtn = document.createElement('button');
      playBtn.className = 'modal-boton primario';
      playBtn.title = 'Reproducir vídeo';
      playBtn.innerHTML = `▶ <span class="btn-text">Reproducir</span>`;
      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open(ejercicio.video, '_blank');
      });
      container.appendChild(playBtn);
    }

    // Botón Editar
    const editBtn = document.createElement('button');
    editBtn.className = 'modal-boton primario';
    editBtn.title = 'Editar';
    editBtn.innerHTML = `✏️ <span class="btn-text">Editar</span>`;
    editBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
      setTimeout(() => window.abrirFormularioEdicion(ejercicio), 200);
    });
    container.appendChild(editBtn);

    // Añadir el contenedor al final del .detalle-contenido
    detalleContenedor.appendChild(container);

    // Asegurar que el contenedor se elimine al cerrar el modal
    const originalCerrar = modalRef.cerrar;
    modalRef.cerrar = function() {
      originalCerrar();
      if (container.parentNode) container.remove();
    };
  };
</script>
