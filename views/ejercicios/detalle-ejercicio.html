<style>
  .detalle-contenido {
    display: flex;
    flex-direction: column;
    height: 100%;
    /*max-height: 100%;*/
    flex: 1;
    min-height: 0; /* ← Permite que este contenedor se encoja si el texto es largo */
    overflow: hidden;
  }

  .detalle-cabecera {
    flex-shrink: 0;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(43, 37, 31, 0.1);
  }

  .detalle-imagen {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 16px;
    border: var(--border-width) solid var(--text-dark);
    margin-bottom: 12px;
  }

  .detalle-grupo {
    margin-bottom: 8px;
  }
  .detalle-grupo strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  .detalle-grupo p {
    margin: 0;
    font-size: 15px;
  }

  /*.detalle-descripcion-wrapper {
    flex: 1;
    min-height: 0;
    margin-top: 12px;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding-right: 4px;
  }*/
  
  .detalle-descripcion-wrapper {
    flex: 1;          /* Ocupa TODO el espacio vertical disponible restante */
    min-height: 0;    /* Crucial: permite que el contenedor reduzca su tamaño teórico y active el scroll */
    margin-top: 12px;
    overflow-y: auto; /* Activa el scroll vertical solo cuando el texto desborde este espacio asignado */

    /* Tus estilos visuales existentes */
    -webkit-overflow-scrolling: touch;
    padding-right: 4px;
  }

  .detalle-descripcion-wrapper strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 4px;
  }

  .detalle-descripcion-wrapper p {
    margin: 0;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.85;
    white-space: pre-wrap;
    word-wrap: break-word;
  }

  .detalle-descripcion-wrapper::-webkit-scrollbar {
    width: 4px;
  }
  .detalle-descripcion-wrapper::-webkit-scrollbar-track {
    background: transparent;
  }
  .detalle-descripcion-wrapper::-webkit-scrollbar-thumb {
    background: var(--text-dark);
    border-radius: 4px;
  }
</style>

<div class="detalle-contenido">
  <div class="detalle-cabecera">
    <div id="detalleImagenContainer"></div>
    <div class="detalle-grupo">
      <strong>Grupo muscular</strong>
      <p id="detalleGrupo"></p>
    </div>
  </div>
  <div class="detalle-descripcion-wrapper" id="detalleDescripcionWrapper">
    <strong>Descripción</strong>
    <p id="detalleDescripcion"></p>
  </div>
</div>
