<form id="ejercicioForm" style="display: flex; flex-direction: column; gap: 12px;">
  <input type="hidden" id="idEjercicio" value="">

  <div>
    <label style="font-weight:700; font-size:13px; display:block; margin-bottom:4px;">Nombre</label>
    <input type="text" id="nombreEjercicio" required class="search-input" style="width:100%;" placeholder="Ej: Press banca">
  </div>

  <div>
    <label style="font-weight:700; font-size:13px; display:block; margin-bottom:4px;">Grupo muscular</label>
    <select id="grupoEjercicio" class="search-input" style="width:100%;">
      <option value="Pecho">Pecho</option>
      <option value="Espalda">Espalda</option>
      <option value="Pierna">Pierna</option>
      <option value="Brazos">Brazos</option>
      <option value="Hombros">Hombros</option>
      <option value="Abdomen">Abdomen</option>
      <option value="Cardio">Cardio</option>
      <option value="Otro">Otro</option>
    </select>
  </div>

  <div>
    <label style="font-weight:700; font-size:13px; display:block; margin-bottom:4px;">Nivel</label>
    <select id="nivelEjercicio" class="search-input" style="width:100%;">
      <option value="Principiante">Principiante</option>
      <option value="Intermedio">Intermedio</option>
      <option value="Avanzado">Avanzado</option>
    </select>
  </div>

  <div>
    <label style="font-weight:700; font-size:13px; display:block; margin-bottom:4px;">Descripción</label>
    <textarea id="descripcionEjercicio" class="search-input" style="width:100%; height:80px; resize:vertical; padding:8px 12px; border:1px solid rgba(43,37,31,0.2); border-radius:8px; font-family:inherit; font-size:14px;" placeholder="Describe el ejercicio, técnica, consejos..."></textarea>
  </div>

  <div id="deleteButtonContainer" style="display:none; margin: 4px 0 8px 0;">
    <button type="button" class="modal-boton peligro" id="btnEliminarEjercicio" style="width:100%;">🗑️ Eliminar ejercicio</button>
  </div>

  <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:8px;">
    <button type="button" class="modal-boton" id="formCancelar">Cancelar</button>
    <button type="submit" class="modal-boton primario">Guardar</button>
  </div>
</form>
