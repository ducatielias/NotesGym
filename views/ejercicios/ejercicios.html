<!-- ===== ESTILOS EXCLUSIVOS DE LA LISTA ===== -->
<style>
  /* Degradados superior e inferior fijos */
  .scroll-fade-top,
  .scroll-fade-bottom {
    position: fixed;
    left: 0;
    right: 0;
    height: 100px;
    pointer-events: none;
    z-index: 4;
  }
  .scroll-fade-top {
    top: 0;
    background: linear-gradient(to bottom, #f5edd8 50%, transparent);
  }
  .scroll-fade-bottom {
    bottom: 0px;
    background: linear-gradient(to top, #f5edd8 50%, transparent);
  }

  .card {
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: var(--card-radius);
    width: 100%;
    padding: 12px;
    box-sizing: border-box;
    box-shadow: 0 var(--shadow-offset) 0 var(--text-dark);
    position: relative;
  }

  /* Header fijo al hacer scroll */
  .profile-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 10px;
    z-index: 5;
    background-color: var(--bg-card);
    padding: 4px;
    border-radius: 18px;
  }
  .profile-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
    justify-content: space-between;
  }
  .avatar-pixel {
    width: 46px;
    height: 46px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    font-size: 24px;
    margin-left: 10px;
  }
  .profile-info {
    min-width: 0;
    padding-top: 2px;
  }
  .profile-name-large {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .settings-btn {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 1px 0 var(--text-dark);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .settings-btn:active {
    transform: scale(0.95);
  }

  /* Búsqueda + Filtro (en la misma fila) */
  .search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
    border-bottom: 1px solid rgba(43, 37, 31, 0.2);
  }
  .search-input {
    width: 100%;
    padding: 8px 36px 8px 12px;
    border: 0px solid rgba(43, 37, 31, 0.2);
    background: #ffffff00;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    box-sizing: border-box;
    box-shadow: 0 0px 0 var(--text-dark);
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 3px 0 var(--accent-orange);
    border-color: var(--accent-orange);
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dark);
    opacity: 0.6;
    padding: 0;
    display: none;
    line-height: 1;
  }
  .search-clear.visible {
    display: block;
  }
  .search-clear:hover {
    opacity: 1;
  }

  .filter-toggle {
    background: #ffffff00;
    border: 0px solid rgba(43, 37, 31, 0.2);
    padding: 0px 0px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 26px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .filter-toggle:active {
    transform: scale(0.95);
    color: #dda40d;
  }
  .filter-toggle.active {
    color: #dda40d;
  }
  .filter-summary-hidden {
    display: none;
  }
  #filterDetails {
    margin-top: 6px;
  }
  details[open] .filter-summary::before {
    transform: rotate(90deg);
  }
  .filter-options {
    padding: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-tag {
    background: var(--bg-card);
    border: 1.5px solid var(--text-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-tag.active {
    background: var(--text-dark);
    color: var(--bg-card);
  }

  /* Tarjetas de ejercicios */
  .exercise-item {
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .exercise-item:active {
    transform: scale(0.98);
    box-shadow: 0 2px 0 var(--text-dark);
  }
  .exercise-item:last-child {
    margin-bottom: 0;
  }
  .exercise-emoji {
    font-size: 32px;
    width: 48px;
    text-align: center;
    flex-shrink: 0;
  }
  .exercise-img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 12px;
    border: var(--border-width) solid var(--text-dark);
    background-color: var(--bg-card);
    flex-shrink: 0;
  }
  .exercise-info {
    flex: 1;
    min-width: 0;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 16px;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .exercise-meta {
    font-size: 13px;
    opacity: 0.7;
    margin: 2px 0 0 0;
  }

  .empty-message {
    text-align: center;
    opacity: 0.5;
    padding: 30px 0;
    font-size: 14px;
  }

  #exerciseList {
    width: 100%;
    padding: 0;
    box-sizing: border-box;
  }
</style>

<!-- Lista de ejercicios -->
<div id="exerciseList"></div>

<script>
  // ============================================================
  //  DATOS Y FUNCIONES GLOBALES
  // ============================================================
  let ejercicios = [
    {
      id: 1,
      nombre: "Press de banca",
      grupo: "Pecho",
      descripcion: "Ejercicio básico para desarrollar pectorales. Acostado en banco plano, levanta la barra con agarre ligeramente más ancho que los hombros. Baja controladamente hasta tocar el pecho y empuja hacia arriba.",
      video: "",
      imagen: ""
    },
    {
      id: 2,
      nombre: "Sentadilla",
      grupo: "Pierna",
      descripcion: "Movimiento fundamental para pierna y glúteo. Coloca la barra sobre los trapecios, baja hasta que los muslos queden paralelos al suelo, manteniendo la espalda recta y el pecho erguido.",
      video: "",
      imagen: ""
    },
    {
      id: 3,
      nombre: "Remo con barra",
      grupo: "Espalda",
      descripcion: "Ejercicio para la espalda media y dorsal ancho. Inclínate hacia adelante con la barra, tira de ella hacia el abdomen manteniendo los codos pegados al cuerpo.",
      video: "",
      imagen: ""
    },
    {
      id: 4,
      nombre: "Curl de bíceps",
      grupo: "Brazos",
      descripcion: "Aísla el bíceps. De pie o sentado, con las pesas a los lados, flexiona los codos llevando las pesas hacia los hombros, controlando el descenso.",
      video: "",
      imagen: ""
    },
    {
      id: 5,
      nombre: "Fondos en paralelas",
      grupo: "Pecho",
      descripcion: "Ejercicio de empuje para pectoral inferior y tríceps. En paralelas, baja el cuerpo hasta que los hombros estén por debajo de los codos, luego empuja hacia arriba.",
      video: "",
      imagen: ""
    },
    {
      id: 6,
      nombre: "Peso muerto",
      grupo: "Pierna",
      descripcion: "Levantamiento de barra desde el suelo. Con pies separados al ancho de caderas, agarra la barra, mantén la espalda recta y levanta extendiendo caderas y rodillas.",
      video: "",
      imagen: ""
    }
  ];

  // Cargar desde localStorage
  const stored = localStorage.getItem('ejercicios');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length) {
        ejercicios = parsed.map(e => ({
          ...e,
          video: e.video || '',
          imagen: e.imagen || ''
        }));
      }
    } catch (e) {}
  }

  let filtroGrupo = null;
  const emojiMap = {
    'Pecho': '🏋️',
    'Espalda': '🔱',
    'Pierna': '🦵',
    'Brazos': '💪',
    'Hombros': '🏋️‍♂️',
    'Abdomen': '🫀',
    'Cardio': '🏃',
    'Otro': '🎯'
  };
  
  const iconMap = {
    'Pecho': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 4h12M6 8h12M12 4v16M9 20h6M3 12h18"/>
              </svg>`, // Representación de barra con discos (Powerlifting)

    'Espalda': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1zM4 22v-7"/>
                </svg>`, // Icono Heráldico / Alas / Estandarte RPG

    'Pierna': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <path d="M6 3v6a6 6 0 0 0 6 6h0a6 6 0 0 0 6-6V3M12 15v6M9 21h6"/>
               </svg>`, // Botas pesadas / Armadura de piernas estructural

    'Brazos': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <path d="M18 15h-2a4 4 0 0 0-4 4v2M14 3h6v6M14 7h4M3 21h4V11H3zM7 15h7a3 3 0 0 0 3-3V7"/>
               </svg>`, // Brazo en flexión con líneas angulares (Bíceps rígido)

    'Hombros': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 3h14M12 3v14M6 17h12M3 10h18"/>
                </svg>`, // Variación de press militar / hombreras de armadura

    'Abdomen': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="3" width="18" height="18" rx="2" stroke-width="2"/>
                  <path d="M9 3v18M15 3v18M3 9h18M3 15h18"/>
                </svg>`, // Rejilla geométrica limpia (Core/Abs definidos)

    'Cardio': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                 <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
               </svg>`, // Pulso/Electrocardiograma de resistencia RPG

    'Otro': `<svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
               <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
             </svg>` // Diana / Objetivo RPG (Reemplazo del target)
  };

  // ===== FUNCIÓN PARA NORMALIZAR (quitar acentos) =====
  function normalizarTexto(texto) {
    return texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  // ===== Funciones globales =====
  window.ejercicios = ejercicios;

  window.guardarEjercicios = function() {
    localStorage.setItem('ejercicios', JSON.stringify(ejercicios));
  };

  function renderizarLista() {
    const container = document.getElementById('exerciseList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    const searchNormalizado = normalizarTexto(searchTerm);

    let filtrados = ejercicios;
    if (filtroGrupo) {
      filtrados = filtrados.filter(e => e.grupo === filtroGrupo);
    }
    if (searchTerm) {
      filtrados = filtrados.filter(e => {
        const nombreNormalizado = normalizarTexto(e.nombre.toLowerCase());
        return nombreNormalizado.includes(searchNormalizado);
      });
    }

    if (filtrados.length === 0) {
      container.innerHTML = '<div class="empty-message">No hay ejercicios que coincidan</div>';
      return;
    }

    let html = '';
    filtrados.forEach(ej => {
      const emoji = iconMap[ej.grupo] || '🏋️';/*const emoji = emojiMap[ej.grupo] || '🏋️';*/
      const imagen = ej.imagen && ej.imagen.trim() !== '' ? ej.imagen : null;
      const imagenHtml = imagen 
        ? `<img src="${imagen}" alt="${ej.nombre}" class="exercise-img" loading="lazy">`
        : `<div class="exercise-emoji">${emoji}</div>`;

      html += `
        <div class="card exercise-item" data-id="${ej.id}">
          ${imagenHtml}
          <div class="exercise-info">
            <div class="exercise-name">${ej.nombre}</div>
            <div class="exercise-meta">${ej.grupo}</div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    container.querySelectorAll('.exercise-item').forEach(card => {
      card.addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        const ejercicio = ejercicios.find(e => e.id === id);
        if (ejercicio) window.mostrarDetalleEjercicio(ejercicio);
      });
    });
  }

  function actualizarFiltros() {
    const grupos = [...new Set(ejercicios.map(e => e.grupo))].sort();
    const container = document.getElementById('filterOptions');
    if (grupos.length === 0) {
      container.innerHTML = '<span style="opacity:0.5; font-size:12px;">No hay grupos</span>';
      return;
    }
    let html = `<span class="filter-tag ${!filtroGrupo ? 'active' : ''}" data-grupo="">Todos</span>`;
    grupos.forEach(g => {
      html += `<span class="filter-tag ${filtroGrupo === g ? 'active' : ''}" data-grupo="${g}">${g}</span>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const grupo = this.dataset.grupo || null;
        filtroGrupo = grupo;
        container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderizarLista();
      });
    });
  }

  window.actualizarVistaEjercicios = function() {
    renderizarLista();
    actualizarFiltros();
  };

  // ============================================================
  //  ABRIR DETALLE (con ejecución de scripts)
  // ============================================================
  window.mostrarDetalleEjercicio = function(ejercicio) {
    fetch('views/ejercicios/detalle-ejercicio.html')
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el detalle');
        return res.text();
      })
      .then(html => {
        const modalRef = mostrarModal({
          titulo: `${iconMap[ejercicio.grupo] || defaultIcon} ${ejercicio.nombre}`,/*titulo: `${emojiMap[ejercicio.grupo] || '🏋️'} ${ejercicio.nombre}`,*/
          contenido: html,
          botones: []
        });

        // Añadir clase para estilos de pantalla completa
        setTimeout(() => {
          const overlay = document.querySelector('.modal-overlay.active');
          if (overlay) overlay.classList.add('modal-detalle-ejercicio');
        }, 50);

        // Esperar a que el DOM esté listo y ejecutar scripts
        setTimeout(() => {
          const modalBox = document.querySelector('.modal-detalle-ejercicio .modal-box');
          if (!modalBox) {
            console.error('No se encontró el modal box');
            return;
          }

          // Ejecutar scripts inline
          const scripts = modalBox.querySelectorAll('script');
          scripts.forEach(script => {
            if (!script.src) {
              try {
                Function(script.textContent)();
              } catch (e) {
                console.error('Error ejecutando script de detalle:', e);
              }
            }
            // Eliminar el script del DOM (opcional)
            script.remove();
          });

          // Ahora initDetalle debe estar definida
          if (typeof window.initDetalle === 'function') {
            window.initDetalle(ejercicio, modalRef);
          } else {
            console.error('initDetalle no definida después de ejecutar scripts');
          }
        }, 100);
      })
      .catch(() => mostrarAlerta('Error', 'No se pudo cargar el detalle del ejercicio.'));
  };

  // ============================================================
  //  ABRIR FORMULARIO (con ejecución de scripts)
  // ============================================================
  window.abrirFormularioEdicion = function(ejercicio = null) {
    fetch('views/ejercicios/formularioejercicios.html')
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el formulario');
        return res.text();
      })
      .then(html => {
        const modalRef = mostrarModal({
          titulo: ejercicio ? '✏️ Editar ejercicio' : '➕ Nuevo ejercicio',
          contenido: html,
          botones: []
        });

        setTimeout(() => {
          const modalBox = document.querySelector('.modal-overlay.active .modal-box');
          if (!modalBox) {
            console.error('No se encontró el modal box del formulario');
            return;
          }

          const scripts = modalBox.querySelectorAll('script');
          scripts.forEach(script => {
            if (!script.src) {
              try {
                Function(script.textContent)();
              } catch (e) {
                console.error('Error ejecutando script del formulario:', e);
              }
            }
            script.remove();
          });

          if (typeof window.initFormulario === 'function') {
            window.initFormulario(ejercicio, modalRef);
          } else {
            console.error('initFormulario no definida después de ejecutar scripts');
          }
        }, 100);
      })
      .catch(() => mostrarAlerta('Error', 'No se pudo cargar el formulario.'));
  };

  // ============================================================
  //  INICIALIZACIÓN DE LA VISTA
  // ============================================================
  window.initEjercicios = function() {
    console.log('Inicializando Ejercicios');

    // Limpieza de modales residuales
    document.body.style.overflow = '';
    document.body.style.pointerEvents = '';
    document.body.classList.remove('modal-open');
    document.querySelectorAll('.modal-overlay').forEach(el => el.remove());

    renderizarLista();
    actualizarFiltros();

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const filterToggle = document.getElementById('filterToggle');
    const filterDetails = document.getElementById('filterDetails');

    function toggleClearButton() {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
    }
    searchInput.addEventListener('input', function() {
      renderizarLista();
      toggleClearButton();
    });
    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      renderizarLista();
      toggleClearButton();
      searchInput.focus();
    });
    toggleClearButton();

    filterToggle.addEventListener('click', function() {
      if (filterDetails.hasAttribute('open')) {
        filterDetails.removeAttribute('open');
        filterToggle.classList.remove('active');
      } else {
        filterDetails.setAttribute('open', '');
        filterToggle.classList.add('active');
      }
    });

    // Botón de ajustes (engranaje / flecha)
    const settingsBtn = document.getElementById('settingsBtnLifebar');
    let isAtTop = true;

    function updateButtonIcon() {
      const isScrolled = window.scrollY > 10;
      if (isScrolled && isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
        isAtTop = false;
      } else if (!isScrolled && !isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5" stroke-linejoin="miter"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
        isAtTop = true;
      }
    }

    window.addEventListener('scroll', updateButtonIcon);
    updateButtonIcon();

    settingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isAtTop) {
        const opciones = [
          {
            label: '➕ Nuevo ejercicio',
            callback: () => window.abrirFormularioEdicion(null)
          },
          {
            label: '🗑️ Borrar todos',
            callback: () => {
              mostrarConfirmacion('Borrar todos', '¿Eliminar todos los ejercicios?', () => {
                ejercicios = [];
                window.guardarEjercicios();
                window.actualizarVistaEjercicios();
              });
            }
          }
        ];
        mostrarMenuContextual(opciones, e);
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  };
</script>
