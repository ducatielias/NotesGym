<style>
  /* Degradados superior e inferior fijos */
  .scroll-fade-top,
  .scroll-fade-bottom {
    position: fixed;
    left: 0;
    right: 0;
    height: 100px;
    pointer-events: none;
    z-index: 4;
  }
  .scroll-fade-top {
    top: 0;
    background: linear-gradient(to bottom, #f5edd8 50%, transparent);
  }
  .scroll-fade-bottom {
    bottom: 0px;
    background: linear-gradient(to top, #f5edd8 50%, transparent);
  }

  .card {
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: var(--card-radius);
    width: 100%;
    padding: 12px;
    box-sizing: border-box;
    box-shadow: 0 var(--shadow-offset) 0 var(--text-dark);
    position: relative;
  }

  /* ===== Header fijo al hacer scroll ===== */
  .profile-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 10px;
    z-index: 5;
    background-color: var(--bg-card);
    padding: 4px;
    border-radius: 18px;
  }
  .profile-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
    justify-content: space-between;
  }
  .avatar-pixel {
    width: 46px;
    height: 46px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    font-size: 24px;
    margin-left: 10px;
  }
  .profile-info {
    min-width: 0;
    padding-top: 2px;
  }
  .profile-name-large {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .settings-btn {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 1px 0 var(--text-dark);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .settings-btn:active {
    transform: scale(0.95);
  }

  /* Búsqueda + Filtro (en la misma fila) */
  .search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
    border-bottom: 1px solid rgba(43, 37, 31, 0.2);
  }
  .search-input {
    width: 100%;
    padding: 8px 36px 8px 12px;
    border: 0px solid rgba(43, 37, 31, 0.2);
    background: #ffffff00;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    box-sizing: border-box;
    box-shadow: 0 0px 0 var(--text-dark);
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 3px 0 var(--accent-orange);
    border-color: var(--accent-orange);
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dark);
    opacity: 0.6;
    padding: 0;
    display: none;
    line-height: 1;
  }
  .search-clear.visible {
    display: block;
  }
  .search-clear:hover {
    opacity: 1;
  }

  .filter-toggle {
    background: #ffffff00;
    border: 0px solid rgba(43, 37, 31, 0.2);
    padding: 0px 0px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 26px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .filter-toggle:active {
    transform: scale(0.95);
    color: #dda40d;
  }
  .filter-toggle.active {
    color: #dda40d;
  }
  .filter-summary-hidden {
    display: none;
  }
  #filterDetails {
    margin-top: 6px;
  }
  details[open] .filter-summary::before {
    transform: rotate(90deg);
  }
  .filter-options {
    padding: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-tag {
    background: var(--bg-card);
    border: 1.5px solid var(--text-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-tag.active {
    background: var(--text-dark);
    color: var(--bg-card);
  }

  /* ===== TARJETAS DE EJERCICIOS ===== */
  .exercise-item {
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .exercise-item:active {
    transform: scale(0.98);
    box-shadow: 0 2px 0 var(--text-dark);
  }
  .exercise-item:last-child {
    margin-bottom: 0;
  }
  .exercise-emoji {
    font-size: 32px;
    width: 48px;
    text-align: center;
    flex-shrink: 0;
  }
  .exercise-img {
    width: 48px;
    height: 48px;
    object-fit: cover;
    border-radius: 12px;
    border: var(--border-width) solid var(--text-dark);
    background-color: var(--bg-card);
    flex-shrink: 0;
  }
  .exercise-info {
    flex: 1;
    min-width: 0;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 16px;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .exercise-meta {
    font-size: 13px;
    opacity: 0.7;
    margin: 2px 0 0 0;
  }

  .empty-message {
    text-align: center;
    opacity: 0.5;
    padding: 30px 0;
    font-size: 14px;
  }

  /* ===== ESTILOS DEL MODAL DE DETALLE ===== */
  /*.modal-detalle-ejercicio .modal-box {
    width: 100% !important;
    max-width: 100% !important;
    height: 100vh !important;
    max-height: 100vh !important;
    border-radius: 0 !important;
    padding: 20px 16px 80px 16px; /* Espacio para botones fijos /
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: none !important;
    border: none !important;
    box-sizing: border-box; /* Crucial para que el padding no rompa el height */
  }*/

  /* Selector clave: el div intermedio creado por mostrarModal */
  /*.modal-detalle-ejercicio .modal-box > div {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-height: 0; /* Evita que el contenedor se estire por el contenido /
    height: 100%;
  }*/
  
.modal-detalle-ejercicio .modal-overlay {
  padding: 0 !important;
}

.modal-detalle-ejercicio .modal-box {
  width: 100vw !important;
  max-width: 100vw !important;
  height: 100vh !important;
  max-height: 100vh !important;
  border-radius: 0 !important;
  margin: 0 !important;
  /* 80px abajo reserva espacio exacto para tus botones fijos */
  padding: 20px 16px 80px 16px !important; 
  
  /* CAMBIO CLAVE: Grid layout perfecto */
  display: grid !important;
  grid-template-rows: auto 1fr !important;
  
  overflow: hidden !important;
  box-sizing: border-box !important;
  box-shadow: none !important;
  border: none !important;
}

/* Forzamos al div intermedio generado por mostrarModal a ser un contenedor flexible completo */
.modal-detalle-ejercicio .modal-box > div {
  display: flex !important;
  flex-direction: column !important;
  min-height: 0 !important;
  overflow: hidden !important;
  height: 100% !important;
}

  /* ===== BOTONES FIJOS CON POSITION: FIXED ===== */
  .detalle-botones-fijos {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 21000;
    display: flex;
    gap: 10px;
    padding: 0 16px;
    width: auto;
    max-width: 100%;
    box-sizing: border-box;
    justify-content: center;
    background: transparent;
    pointer-events: none;
  }

  .detalle-botones-fijos .modal-boton {
    pointer-events: auto;
    flex: 0 1 auto;
    padding: 10px 18px;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 6px;
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--text-dark);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    color: var(--text-dark);
    font-family: 'Space Mono', monospace;
  }

  .detalle-botones-fijos .modal-boton:active {
    transform: scale(0.95);
    box-shadow: 0 1px 0 var(--text-dark);
  }

  .detalle-botones-fijos .modal-boton.primario {
    background-color: var(--text-dark);
    color: var(--bg-card);
  }

  @media (max-width: 600px) {
    .detalle-botones-fijos {
      width: 90%;
      gap: 8px;
    }
    .detalle-botones-fijos .modal-boton {
      flex: 1;
      justify-content: center;
      padding: 14px 8px;
      font-size: 20px;
    }
    .detalle-botones-fijos .btn-text {
      display: none;
    }
  }

  /* Asegurar que #exerciseList ocupe todo el ancho */
  #exerciseList {
    width: 100%;
    padding: 0;
    box-sizing: border-box;
  }
</style>

    const match = url.match(regex);

  const stored = localStorage.getItem('ejercicios');

    localStorage.setItem('ejercicios', JSON.stringify(ejercicios));
  }

  // ============================================================

    'Cardio': '🏃',
    'Otro': '🎯'
  };

  // ============================================================
  //  RENDERIZADO DE LISTA (tarjetas)
  // ============================================================
  function renderizarLista() {
    const container = document.getElementById('exerciseList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

    let filtrados = ejercicios;
    if (filtroGrupo) {
      filtrados = filtrados.filter(e => e.grupo === filtroGrupo);
    }
    if (searchTerm) {
      filtrados = filtrados.filter(e => e.nombre.toLowerCase().includes(searchTerm));
    }

    if (filtrados.length === 0) {
      container.innerHTML = '<div class="empty-message">No hay ejercicios que coincidan</div>';
      return;
    }

    let html = '';
    filtrados.forEach(ej => {
      const emoji = emojiMap[ej.grupo] || '🏋️';
      const imagen = ej.imagen && ej.imagen.trim() !== '' ? ej.imagen : null;
      const imagenHtml = imagen 
        ? `<img src="${imagen}" alt="${ej.nombre}" class="exercise-img" loading="lazy">`
        : `<div class="exercise-emoji">${emoji}</div>`;

      html += `
        <div class="card exercise-item" data-id="${ej.id}">
          ${imagenHtml}
          <div class="exercise-info">
            <div class="exercise-name">${ej.nombre}</div>
            <div class="exercise-meta">${ej.grupo}</div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // Click en tarjeta → abrir detalle
    container.querySelectorAll('.exercise-item').forEach(card => {
      card.addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        const ejercicio = ejercicios.find(e => e.id === id);
        if (ejercicio) mostrarDetalleEjercicio(ejercicio);
      });
    });
  }

*/
  function mostrarDetalleEjercicio(ejercicio) {
  const emoji = emojiMap[ejercicio.grupo] || '🏋️';
  const video = ejercicio.video && ejercicio.video.trim() !== '' ? ejercicio.video : null;

  fetch('views/ejercicios/detalle-ejercicio.html')
    .then(res => {
      if (!res.ok) throw new Error('No se pudo cargar el detalle');
      return res.text();
    })
    .then(html => {
      const modalRef = mostrarModal({
        titulo: `${emoji} ${ejercicio.nombre}`,
        contenido: html,
        botones: []
      });

      // Añadir clase para estilos del modal (pantalla completa)
      setTimeout(() => {
        const overlay = document.querySelector('.modal-overlay.active');
        if (overlay) {
          overlay.classList.add('modal-detalle-ejercicio');
        }
      }, 50);

      // Rellenar datos y crear botones fijos
      setTimeout(() => {
        
        // ─── NUEVO: AJUSTE DEL CONTENEDOR INTERMEDIO GENERADO POR JS ───
        const modalBox = document.querySelector('.modal-detalle-ejercicio .modal-box');
        if (modalBox) {
          // Buscamos el primer div hijo directo de modal-box (el contenedor intermedio)
          const contentWrapper = modalBox.querySelector(':scope > div');
          if (contentWrapper) {
            contentWrapper.style.display = 'flex';
            contentWrapper.style.flexDirection = 'column';
            contentWrapper.style.minHeight = '0';
            contentWrapper.style.height = '100%';
            contentWrapper.style.overflow = 'hidden';
            contentWrapper.style.flex = '1';
          }
        }
        // ──────────────────────────────────────────────────────────────

        // Imagen
        const imgContainer = document.getElementById('detalleImagenContainer');
        if (imgContainer) {
          const imagen = ejercicio.imagen && ejercicio.imagen.trim() !== '' ? ejercicio.imagen : null;
          imgContainer.innerHTML = imagen ? `<img src="${imagen}" alt="${ejercicio.nombre}" class="detalle-imagen" loading="lazy">` : '';
        }

        const grupoEl = document.getElementById('detalleGrupo');
        if (grupoEl) grupoEl.textContent = ejercicio.grupo;

        const descEl = document.getElementById('detalleDescripcion');
        if (descEl) descEl.textContent = ejercicio.descripcion || 'Sin descripción.';

        // Crear botones fijos
        crearBotonesFijos(modalRef, ejercicio, video);
      }, 100);
    })
    .catch(err => {
      console.error(err);
      mostrarAlerta('Error', 'No se pudo cargar el detalle del ejercicio.');
    });
}
  
  function crearBotonesFijos(modalRef, ejercicio, video) {
    eliminarBotonesFijos();

    const container = document.createElement('div');
    container.className = 'detalle-botones-fijos';
    container.id = 'detalleBotonesFijos';

    // Botón Cerrar
    const closeBtn = document.createElement('button');
    closeBtn.className = 'modal-boton';
    closeBtn.title = 'Cerrar';
    closeBtn.innerHTML = `✖ <span class="btn-text">Cerrar</span>`;
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
      eliminarBotonesFijos();
    });
    container.appendChild(closeBtn);

    // Botón Reproducir (si hay video)
    if (video) {
      const playBtn = document.createElement('button');
      playBtn.className = 'modal-boton primario';
      playBtn.title = 'Reproducir vídeo';
      playBtn.innerHTML = `▶ <span class="btn-text">Reproducir</span>`;
      playBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        window.open(video, '_blank');
      });
      container.appendChild(playBtn);
    }

    // Botón Editar
    const editBtn = document.createElement('button');
    editBtn.className = 'modal-boton primario';
    editBtn.title = 'Editar ejercicio';
    editBtn.innerHTML = `✏️ <span class="btn-text">Editar</span>`;
    editBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      modalRef.cerrar();
      eliminarBotonesFijos();
      setTimeout(() => abrirFormularioEdicion(ejercicio), 200);
    });
    container.appendChild(editBtn);

    document.body.appendChild(container);
    botonesFijosContainer = container;

    const originalCerrar = modalRef.cerrar;
    modalRef.cerrar = function() {
      originalCerrar();
      eliminarBotonesFijos();
    };
  }

  function eliminarBotonesFijos() {
    if (botonesFijosContainer) {
      botonesFijosContainer.remove();
      botonesFijosContainer = null;
    }
  }

  // ============================================================
  //  FORMULARIO DE EDICIÓN / NUEVO
  // ============================================================
  function abrirFormularioEdicion(ejercicio = null) {
    fetch('views/ejercicios/formularioejercicios.html')
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el formulario');
        return res.text();
      })
      .then(html => {
        mostrarModal({
          titulo: ejercicio ? '✏️ Editar ejercicio' : '➕ Nuevo ejercicio',
          contenido: html,
          botones: []
        });

        requestAnimationFrame(() => {
          const form = document.getElementById('ejercicioForm');
          if (!form) {
            console.error('No se encontró el formulario');
            return;
          }

          const nombreInput = document.getElementById('nombreEjercicio');
          const grupoSelect = document.getElementById('grupoEjercicio');
          const descTextarea = document.getElementById('descripcionEjercicio');
          const idInput = document.getElementById('idEjercicio');
          const videoInput = document.getElementById('videoEjercicio');
          const imagenInput = document.getElementById('imagenEjercicio');
          const deleteContainer = document.getElementById('deleteButtonContainer');
          const btnEliminar = document.getElementById('btnEliminarEjercicio');
          const cancelBtn = document.getElementById('formCancelar');

          if (ejercicio && ejercicio.id) {
            if (nombreInput) nombreInput.value = ejercicio.nombre;
            if (grupoSelect) grupoSelect.value = ejercicio.grupo;
            if (descTextarea) descTextarea.value = ejercicio.descripcion || '';
            if (idInput) idInput.value = ejercicio.id;
            if (videoInput) videoInput.value = ejercicio.video || '';
            if (imagenInput) imagenInput.value = ejercicio.imagen || '';
            if (deleteContainer) deleteContainer.style.display = 'block';

            if (btnEliminar) {
              btnEliminar.onclick = null;
              btnEliminar.addEventListener('click', function() {
                mostrarConfirmacion(
                  '🗑️ Eliminar ejercicio',
                  `¿Estás seguro de eliminar "${ejercicio.nombre}"? Esta acción no se puede deshacer.`,
                  () => {
                    ejercicios = ejercicios.filter(e => e.id !== ejercicio.id);
                    guardarEjercicios();
                    actualizarFiltros();
                    renderizarLista();
                    const overlay = document.querySelector('.modal-overlay');
                    if (overlay) {
                      overlay.classList.remove('active');
                      setTimeout(() => overlay.remove(), 200);
                    }
                  }
                );
              });
            }
          } else {
            if (deleteContainer) deleteContainer.style.display = 'none';
            if (idInput) idInput.value = '';
            if (nombreInput) nombreInput.value = '';
            if (grupoSelect) grupoSelect.value = 'Pecho';
            if (descTextarea) descTextarea.value = '';
            if (videoInput) videoInput.value = '';
            if (imagenInput) imagenInput.value = '';
          }

          // Autocompletado de imagen desde video
          if (videoInput && imagenInput) {
            videoInput.removeEventListener('input', autocompleteImagen);
            videoInput.addEventListener('input', autocompleteImagen);
            function autocompleteImagen() {
              if (!imagenInput.value) {
                const thumb = getYouTubeThumbnail(this.value);
                if (thumb) imagenInput.value = thumb;
              }
            }
          }

          form.onsubmit = function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreEjercicio').value.trim();
            const grupo = document.getElementById('grupoEjercicio').value;
            const descripcion = document.getElementById('descripcionEjercicio').value.trim();
            const video = document.getElementById('videoEjercicio').value.trim();
            const imagen = document.getElementById('imagenEjercicio').value.trim();
            const id = document.getElementById('idEjercicio').value;

            if (!nombre) {
              mostrarAlerta('Error', 'El nombre es obligatorio');
              return;
            }

            const datos = { nombre, grupo, descripcion, video, imagen };
            if (id) {
              datos.id = parseInt(id);
              const index = ejercicios.findIndex(e => e.id === datos.id);
              if (index !== -1) {
                ejercicios[index] = { ...ejercicios[index], ...datos };
              }
            } else {
              const nuevoId = ejercicios.length ? Math.max(...ejercicios.map(e => e.id)) + 1 : 1;
              ejercicios.push({ id: nuevoId, ...datos });
            }
            guardarEjercicios();
            actualizarFiltros();
            renderizarLista();
            cerrarModalActual();
          };

          if (cancelBtn) {
            cancelBtn.onclick = function() {
              cerrarModalActual();
            };
          }

          function cerrarModalActual() {
            const overlay = document.querySelector('.modal-overlay');
            if (overlay) {
              overlay.classList.remove('active');
              setTimeout(() => overlay.remove(), 200);
            }
          }
        });
      })
      .catch(err => {
        console.error(err);
        mostrarAlerta('Error', 'No se pudo cargar el formulario.');
      });
  }

  // ============================================================
  //  FILTROS (grupos)
  // ============================================================
  function actualizarFiltros() {
    const grupos = [...new Set(ejercicios.map(e => e.grupo))].sort();
    const container = document.getElementById('filterOptions');
    if (grupos.length === 0) {
      container.innerHTML = '<span style="opacity:0.5; font-size:12px;">No hay grupos</span>';
      return;
    }
    let html = `<span class="filter-tag ${!filtroGrupo ? 'active' : ''}" data-grupo="">Todos</span>`;
    grupos.forEach(g => {
      html += `<span class="filter-tag ${filtroGrupo === g ? 'active' : ''}" data-grupo="${g}">${g}</span>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const grupo = this.dataset.grupo || null;
        filtroGrupo = grupo;
        container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderizarLista();
      });
    });
  }

  // ============================================================
  //  INICIALIZACIÓN
  // ============================================================
  window.initEjercicios = function() {
    console.log('Inicializando Ejercicios');
    
    // ─── DESBLOQUEO TOTAL Y ELIMINACIÓN DE MODALES RESIDUALES ───
  // 1. Forzar al body a recuperar el scroll normal
  document.body.style.overflow = '';
  document.body.style.pointerEvents = '';
  document.body.classList.remove('modal-open'); 

  // 2. Buscar y destruir cualquier overlay de modal activo que se haya quedado huérfano en el DOM
  const overlaysResiduales = document.querySelectorAll('.modal-overlay');
  overlaysResiduales.forEach(overlay => {
    overlay.remove();
  });
    
    renderizarLista();
    actualizarFiltros();

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const filterToggle = document.getElementById('filterToggle');
    const filterDetails = document.getElementById('filterDetails');

    function toggleClearButton() {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
    }
    searchInput.addEventListener('input', function() {
      renderizarLista();
      toggleClearButton();
    });
    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      renderizarLista();
      toggleClearButton();
      searchInput.focus();
    });
    toggleClearButton();

    filterToggle.addEventListener('click', function() {
      if (filterDetails.hasAttribute('open')) {
        filterDetails.removeAttribute('open');
        filterToggle.classList.remove('active');
      } else {
        filterDetails.setAttribute('open', '');
        filterToggle.classList.add('active');
      }
    });

    // Botón de ajustes
    const settingsBtn = document.getElementById('settingsBtnLifebar');
    let isAtTop = true;

    function updateButtonIcon() {
      const isScrolled = window.scrollY > 10;
      if (isScrolled && isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
        isAtTop = false;
      } else if (!isScrolled && !isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5" stroke-linejoin="miter"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
        isAtTop = true;
      }
    }

    window.addEventListener('scroll', updateButtonIcon);
    updateButtonIcon();

    settingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isAtTop) {
        const opciones = [{
          label: '➕ Nuevo ejercicio',
          callback: () => abrirFormularioEdicion(null)
        }, {
          label: '🗑️ Borrar todos',
          callback: () => {
            mostrarConfirmacion('Borrar todos', '¿Eliminar todos los ejercicios?', () => {
              ejercicios = [];
              guardarEjercicios();
              actualizarFiltros();
              renderizarLista();
            });
          }
        }];
        mostrarMenuContextual(opciones, e);
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  };


</script>
