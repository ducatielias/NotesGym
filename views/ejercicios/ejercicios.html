<style>
  /* Degradados superior e inferior fijos */
  .scroll-fade-top,
  .scroll-fade-bottom {
    position: fixed;
    left: 0;
    right: 0;
    height: 70px;
    pointer-events: none;
    z-index: 4;
  }
  .scroll-fade-top {
    top: 0;
    background: linear-gradient(to bottom, #f5edd8 50%, transparent);
  }
  .scroll-fade-bottom {
    bottom: 0px;
    background: linear-gradient(to top, #f5edd8 50%, transparent);
  }

  .card {
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: var(--card-radius);
    width: 100%;
    padding: 12px;
    box-sizing: border-box;
    box-shadow: 0 var(--shadow-offset) 0 var(--text-dark);
    position: relative;
  }

  /* ===== Header fijo al hacer scroll ===== */
  .profile-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 10px;
    z-index: 5;
    background-color: var(--bg-card);
  }
  .profile-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
    justify-content: space-between;
  }
  .avatar-pixel {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 3px 0 var(--text-dark);
    font-size: 24px;
  }
  .profile-info {
    min-width: 0;
    padding-top: 2px;
  }
  .profile-name-large {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .settings-btn {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 3px 0 var(--text-dark);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .settings-btn:active {
    transform: scale(0.95);
  }

  /* Búsqueda + Filtro (en la misma fila) */
  .search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
    border-bottom: 1px solid rgba(43, 37, 31, 0.2);
  }
  .search-input {
    width: 100%;
    padding: 8px 36px 8px 12px;
    border: 0px solid rgba(43, 37, 31, 0.2);
    background: #ffffff00;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    box-sizing: border-box;
    box-shadow: 0 0px 0 var(--text-dark);
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 3px 0 var(--accent-orange);
    border-color: var(--accent-orange);
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dark);
    opacity: 0.6;
    padding: 0;
    display: none;
    line-height: 1;
  }
  .search-clear.visible {
    display: block;
  }
  .search-clear:hover {
    opacity: 1;
  }

  .filter-toggle {
    background: #ffffff00;
    border: 0px solid rgba(43, 37, 31, 0.2);
    padding: 0px 0px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 26px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .filter-toggle:active {
    transform: scale(0.95);
    color: #dda40d;
  }
  .filter-toggle.active {
    color: #dda40d;
  }
  .filter-summary-hidden {
    display: none;
  }
  #filterDetails {
    margin-top: 6px;
  }
  details[open] .filter-summary::before {
    transform: rotate(90deg);
  }
  .filter-options {
    padding: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-tag {
    background: var(--bg-card);
    border: 1.5px solid var(--text-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-tag.active {
    background: var(--text-dark);
    color: var(--bg-card);
  }

  /* ===== TARJETAS DE EJERCICIOS (ahora usan .card) ===== */
  .exercise-item {
    cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.1s ease;
    margin-bottom: 8px;
    /* padding, borde, sombra, fondo ya los hereda de .card */
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .exercise-item:active {
    transform: scale(0.98);
    box-shadow: 0 2px 0 var(--text-dark);
  }
  .exercise-item:last-child {
    margin-bottom: 0;
  }
  .exercise-emoji {
    font-size: 32px;
    width: 48px;
    text-align: center;
    flex-shrink: 0;
  }
  .exercise-info {
    flex: 1;
    min-width: 0;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 16px;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .exercise-meta {
    font-size: 13px;
    opacity: 0.7;
    margin: 2px 0 0 0;
  }

  .empty-message {
    text-align: center;
    opacity: 0.5;
    padding: 30px 0;
    font-size: 14px;
  }

  /* Estilos para el contenido del modal de detalle */
  .detail-group {
    margin-bottom: 12px;
  }
  .detail-group strong {
    display: block;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    opacity: 0.5;
    margin-bottom: 2px;
  }
  .detail-group p {
    margin: 0;
    font-size: 15px;
  }
  .detail-desc {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid rgba(43, 37, 31, 0.1);
  }
  .detail-desc p {
    margin: 0;
    font-size: 14px;
    line-height: 1.6;
    opacity: 0.85;
  }

  /* Asegurar que #exerciseList ocupe todo el ancho y no tenga padding extra */
  #exerciseList {
    width: 100%;
    padding: 0;
    box-sizing: border-box;
  }
</style>

<!-- Degradados de scroll -->
<div class="scroll-fade-top"></div>
<div class="scroll-fade-bottom"></div>

<!-- Header -->

<!-- Búsqueda + Filtro -->
<div class="card">
  <div class="search-wrapper">
    <div class="search-input-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar ejercicio...">
      <button class="search-clear" id="searchClear" aria-label="Borrar texto">✕</button>

<div class="section-label">Lista ejercicios</div>

<!-- Lista de ejercicios (cada ejercicio es un .card) -->
<div id="exerciseList"></div>

<script>
  // ============================================================
  //  DATOS
  // ============================================================
  let ejercicios = [{
    id: 1,
    nombre: "Press de banca",
    grupo: "Pecho",
    nivel: "Intermedio",
    descripcion: "Ejercicio básico para desarrollar pectorales. Acostado en banco plano, levanta la barra con agarre ligeramente más ancho que los hombros. Baja controladamente hasta tocar el pecho y empuja hacia arriba."
  }, {
    id: 2,
    nombre: "Sentadilla",
    grupo: "Pierna",
    nivel: "Avanzado",
    descripcion: "Movimiento fundamental para pierna y glúteo. Coloca la barra sobre los trapecios, baja hasta que los muslos queden paralelos al suelo, manteniendo la espalda recta y el pecho erguido."
  }, {
    id: 3,
    nombre: "Remo con barra",
    grupo: "Espalda",
    nivel: "Intermedio",
    descripcion: "Ejercicio para la espalda media y dorsal ancho. Inclínate hacia adelante con la barra, tira de ella hacia el abdomen manteniendo los codos pegados al cuerpo."
  }, {
    id: 4,
    nombre: "Curl de bíceps",
    grupo: "Brazos",
    nivel: "Principiante",
    descripcion: "Aísla el bíceps. De pie o sentado, con las pesas a los lados, flexiona los codos llevando las pesas hacia los hombros, controlando el descenso."
  }, {
    id: 5,
    nombre: "Fondos en paralelas",
    grupo: "Pecho",
    nivel: "Avanzado",
    descripcion: "Ejercicio de empuje para pectoral inferior y tríceps. En paralelas, baja el cuerpo hasta que los hombros estén por debajo de los codos, luego empuja hacia arriba."
  }, {
    id: 6,
    nombre: "Peso muerto",
    grupo: "Pierna",
    nivel: "Avanzado",
    descripcion: "Levantamiento de barra desde el suelo. Con pies separados al ancho de caderas, agarra la barra, mantén la espalda recta y levanta extendiendo caderas y rodillas."
  }];

  // Cargar desde localStorage
  const stored = localStorage.getItem('ejercicios');
  if (stored) {
    try {
      const parsed = JSON.parse(stored);
      if (Array.isArray(parsed) && parsed.length) ejercicios = parsed;
    } catch (e) {}
  }

  let filtroGrupo = null;

  function guardarEjercicios() {
    localStorage.setItem('ejercicios', JSON.stringify(ejercicios));
  }

  // ============================================================
  //  MAPA DE EMOJIS POR GRUPO
  // ============================================================
  const emojiMap = {
    'Pecho': '🏋️',
    'Espalda': '🔱',
    'Pierna': '🦵',
    'Brazos': '💪',
    'Hombros': '🏋️‍♂️',
    'Abdomen': '🫀',
    'Cardio': '🏃',
    'Otro': '🎯'
  };

  // ============================================================
  //  RENDERIZADO DE LISTA (tarjetas)
  // ============================================================
  function renderizarLista() {
    const container = document.getElementById('exerciseList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();

    let filtrados = ejercicios;
    if (filtroGrupo) {
      filtrados = filtrados.filter(e => e.grupo === filtroGrupo);
    }
    if (searchTerm) {
      filtrados = filtrados.filter(e => e.nombre.toLowerCase().includes(searchTerm));
    }

    if (filtrados.length === 0) {
      container.innerHTML = '<div class="empty-message">No hay ejercicios que coincidan</div>';
      return;
    }

    let html = '';
    filtrados.forEach(ej => {
      const emoji = emojiMap[ej.grupo] || '🏋️';
      html += `
        <div class="card exercise-item" data-id="${ej.id}">
          <div class="exercise-emoji">${emoji}</div>
          <div class="exercise-info">
            <div class="exercise-name">${ej.nombre}</div>
            <div class="exercise-meta">${ej.grupo} · ${ej.nivel}</div>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // Click en tarjeta → abrir detalle
    container.querySelectorAll('.exercise-item').forEach(card => {
      card.addEventListener('click', function() {
        const id = parseInt(this.dataset.id);
        const ejercicio = ejercicios.find(e => e.id === id);
        if (ejercicio) mostrarDetalleEjercicio(ejercicio);
      });
    });
  }

  // ============================================================
  //  MODAL DE DETALLE
  // ============================================================
  function mostrarDetalleEjercicio(ejercicio) {
    const emoji = emojiMap[ejercicio.grupo] || '🏋️';
    const desc = ejercicio.descripcion || 'Sin descripción.';

    const contenido = `
      <div class="detail-group">
        <strong>Grupo muscular</strong>
        <p>${ejercicio.grupo}</p>
      </div>
      <div class="detail-group">
        <strong>Nivel</strong>
        <p>${ejercicio.nivel}</p>
      </div>
      <div class="detail-desc">
        <strong>Descripción</strong>
        <p>${desc}</p>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:20px;">
        <button class="modal-boton primario" id="btnEditarDesdeDetalle">✏️ Editar</button>
      </div>
    `;

    const modalRef = mostrarModal({
      titulo: `${emoji} ${ejercicio.nombre}`,
      contenido: contenido,
      botones: [] // sin botones automáticos
    });

    const btnEditar = document.getElementById('btnEditarDesdeDetalle');
    if (btnEditar) {
      btnEditar.addEventListener('click', function() {
        modalRef.cerrar();
        setTimeout(() => abrirFormularioEdicion(ejercicio), 200);
      });
    }
  }

  // ============================================================
  //  FORMULARIO DE EDICIÓN / NUEVO
  // ============================================================
  function abrirFormularioEdicion(ejercicio = null) {
    fetch('views/ejercicios/formularioejercicios.html')
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el formulario');
        return res.text();
      })
      .then(html => {
        // Mostrar modal con el formulario
        mostrarModal({
          titulo: ejercicio ? '✏️ Editar ejercicio' : '➕ Nuevo ejercicio',
          contenido: html,
          botones: []
        });

        // Esperar a que el DOM del modal esté listo y rellenar campos
        requestAnimationFrame(() => {
          const form = document.getElementById('ejercicioForm');
          if (!form) {
            console.error('No se encontró el formulario');
            return;
          }

          const nombreInput = document.getElementById('nombreEjercicio');
          const grupoSelect = document.getElementById('grupoEjercicio');
          const nivelSelect = document.getElementById('nivelEjercicio');
          const descTextarea = document.getElementById('descripcionEjercicio');
          const idInput = document.getElementById('idEjercicio');
          const deleteContainer = document.getElementById('deleteButtonContainer');
          const btnEliminar = document.getElementById('btnEliminarEjercicio');
          const cancelBtn = document.getElementById('formCancelar');

          // Si es edición, rellenar campos
          if (ejercicio && ejercicio.id) {
            if (nombreInput) nombreInput.value = ejercicio.nombre;
            if (grupoSelect) grupoSelect.value = ejercicio.grupo;
            if (nivelSelect) nivelSelect.value = ejercicio.nivel;
            if (descTextarea) descTextarea.value = ejercicio.descripcion || '';
            if (idInput) idInput.value = ejercicio.id;
            if (deleteContainer) deleteContainer.style.display = 'block';

            // Evento eliminar
            if (btnEliminar) {
              btnEliminar.onclick = null;
              btnEliminar.addEventListener('click', function() {
                mostrarConfirmacion(
                  '🗑️ Eliminar ejercicio',
                  `¿Estás seguro de eliminar "${ejercicio.nombre}"? Esta acción no se puede deshacer.`,
                  () => {
                    ejercicios = ejercicios.filter(e => e.id !== ejercicio.id);
                    guardarEjercicios();
                    actualizarFiltros();
                    renderizarLista();
                    // Cerrar modales
                    const overlay = document.querySelector('.modal-overlay');
                    if (overlay) {
                      overlay.classList.remove('active');
                      setTimeout(() => overlay.remove(), 200);
                    }
                  }
                );
              });
            }
          } else {
            if (deleteContainer) deleteContainer.style.display = 'none';
            if (idInput) idInput.value = '';
            if (nombreInput) nombreInput.value = '';
            if (grupoSelect) grupoSelect.value = 'Pecho';
            if (nivelSelect) nivelSelect.value = 'Principiante';
            if (descTextarea) descTextarea.value = '';
          }

          // Evento submit del formulario
          form.onsubmit = function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreEjercicio').value.trim();
            const grupo = document.getElementById('grupoEjercicio').value;
            const nivel = document.getElementById('nivelEjercicio').value;
            const descripcion = document.getElementById('descripcionEjercicio').value.trim();
            const id = document.getElementById('idEjercicio').value;

            if (!nombre) {
              mostrarAlerta('Error', 'El nombre es obligatorio');
              return;
            }

            const datos = { nombre, grupo, nivel, descripcion };
            if (id) {
              datos.id = parseInt(id);
              const index = ejercicios.findIndex(e => e.id === datos.id);
              if (index !== -1) {
                ejercicios[index] = { ...ejercicios[index], ...datos };
              }
            } else {
              const nuevoId = ejercicios.length ? Math.max(...ejercicios.map(e => e.id)) + 1 : 1;
              ejercicios.push({ id: nuevoId, ...datos });
            }
            guardarEjercicios();
            actualizarFiltros();
            renderizarLista();
            cerrarModalActual();
          };

          if (cancelBtn) {
            cancelBtn.onclick = function() {
              cerrarModalActual();
            };
          }

          function cerrarModalActual() {
            const overlay = document.querySelector('.modal-overlay');
            if (overlay) {
              overlay.classList.remove('active');
              setTimeout(() => overlay.remove(), 200);
            }
          }
        });
      })
      .catch(err => {
        console.error(err);
        mostrarAlerta('Error', 'No se pudo cargar el formulario.');
      });
  }

  // ============================================================
  //  FILTROS (grupos)
  // ============================================================
  function actualizarFiltros() {
    const grupos = [...new Set(ejercicios.map(e => e.grupo))].sort();
    const container = document.getElementById('filterOptions');
    if (grupos.length === 0) {
      container.innerHTML = '<span style="opacity:0.5; font-size:12px;">No hay grupos</span>';
      return;
    }
    let html = `<span class="filter-tag ${!filtroGrupo ? 'active' : ''}" data-grupo="">Todos</span>`;
    grupos.forEach(g => {
      html += `<span class="filter-tag ${filtroGrupo === g ? 'active' : ''}" data-grupo="${g}">${g}</span>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const grupo = this.dataset.grupo || null;
        filtroGrupo = grupo;
        container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderizarLista();
      });
    });
  }

  // ============================================================
  //  INICIALIZACIÓN
  // ============================================================
  window.initEjercicios = function() {
    console.log('Inicializando Ejercicios');
    renderizarLista();
    actualizarFiltros();

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const filterToggle = document.getElementById('filterToggle');
    const filterDetails = document.getElementById('filterDetails');

    function toggleClearButton() {
      searchClear.classList.toggle('visible', searchInput.value.length > 0);
    }
    searchInput.addEventListener('input', function() {
      renderizarLista();
      toggleClearButton();
    });
    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      renderizarLista();
      toggleClearButton();
      searchInput.focus();
    });
    toggleClearButton();

    filterToggle.addEventListener('click', function() {
      if (filterDetails.hasAttribute('open')) {
        filterDetails.removeAttribute('open');
        filterToggle.classList.remove('active');
      } else {
        filterDetails.setAttribute('open', '');
        filterToggle.classList.add('active');
      }
    });

    // ===== Botón de ajustes (cambia icono al hacer scroll) =====
    const settingsBtn = document.getElementById('settingsBtnLifebar');
    let isAtTop = true;

    function updateButtonIcon() {
      const isScrolled = window.scrollY > 10;
      if (isScrolled && isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
        isAtTop = false;
      } else if (!isScrolled && !isAtTop) {
        settingsBtn.innerHTML =
          `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5" stroke-linejoin="miter"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
        isAtTop = true;
      }
    }

    window.addEventListener('scroll', updateButtonIcon);
    updateButtonIcon();

    settingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isAtTop) {
        const opciones = [{
          label: '➕ Nuevo ejercicio',
          callback: () => abrirFormularioEdicion(null)
        }, {
          label: '🗑️ Borrar todos',
          callback: () => {
            mostrarConfirmacion('Borrar todos', '¿Eliminar todos los ejercicios?', () => {
              ejercicios = [];
              guardarEjercicios();
              actualizarFiltros();
              renderizarLista();
            });
          }
        }];
        mostrarMenuContextual(opciones, e);
      } else {
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  };
</script>
