<style>
  /* Estilos específicos para ejercicios */
  .search-input {
    width: 100%;
    padding: 8px 12px;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    background: var(--bg-card);
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    box-sizing: border-box;
    box-shadow: 0 3px 0 var(--text-dark);
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 3px 0 var(--accent-orange);
    border-color: var(--accent-orange);
  }
  .filter-section {
    margin-top: 8px;
  }
  .filter-summary {
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(43,37,31,0.2);
  }
  .filter-summary::-webkit-details-marker {
    display: none;
  }
  .filter-summary::before {
    content: "▶";
    font-size: 12px;
    transition: transform 0.2s;
  }
  details[open] .filter-summary::before {
    transform: rotate(90deg);
  }
  .filter-options {
    padding: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-tag {
    background: var(--bg-card);
    border: 1.5px solid var(--text-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-tag.active {
    background: var(--text-dark);
    color: var(--bg-card);
  }
  .exercise-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(43,37,31,0.1);
  }
  .exercise-item:last-child {
    border-bottom: none;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 15px;
  }
  .exercise-meta {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .exercise-actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.5;
    transition: opacity 0.1s;
  }
  .exercise-actions button:hover {
    opacity: 1;
  }
  .empty-message {
    text-align: center;
    opacity: 0.5;
    padding: 30px 0;
    font-size: 14px;
  }
  .menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    border-radius: 10px;
    background: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    box-shadow: 0 3px 0 var(--text-dark);
    line-height: 1;
  }
  .menu-btn:active {
    transform: scale(0.95);
  }
</style>

<div class="card">
  <div class="card-header">
    <div class="card-title">🏋️ Ejercicios</div>
    <button class="menu-btn" id="ejerciciosMenuBtn" title="Opciones">⚙️</button>
  </div>
</div>

<!-- Búsqueda -->
<div class="card">
  <input type="text" class="search-input" id="searchInput" placeholder="Buscar ejercicio...">
</div>

<!-- Filtros expandibles -->
<div class="card filter-section">
  <details id="filterDetails">
    <summary class="filter-summary">Filtros</summary>
    <div class="filter-options" id="filterOptions">
    </div>
  </details>
</div>

<!-- Lista de ejercicios -->
<div class="card" style="padding-bottom: 8px;">
  <div id="exerciseList">
  </div>
</div>

<script>
  // Datos iniciales (ejemplo)
  let ejercicios = [
    { id: 1, nombre: "Press de banca", grupo: "Pecho", nivel: "Intermedio" },
    { id: 2, nombre: "Sentadilla", grupo: "Pierna", nivel: "Avanzado" },
    { id: 3, nombre: "Remo con barra", grupo: "Espalda", nivel: "Intermedio" },
    { id: 4, nombre: "Curl de bíceps", grupo: "Brazos", nivel: "Principiante" },
    { id: 5, nombre: "Fondos en paralelas", grupo: "Pecho", nivel: "Avanzado" },
    { id: 6, nombre: "Peso muerto", grupo: "Pierna", nivel: "Avanzado" },
  ];

  // Cargar desde localStorage si existe
  const stored = localStorage.getItem('ejercicios');
  if (stored) {
    try {
      ejercicios = JSON.parse(stored);
    } catch(e) {}
  }

  let filtroGrupo = null; // null = todos

  function guardarEjercicios() {
    localStorage.setItem('ejercicios', JSON.stringify(ejercicios));
  }

  // Renderizar lista
  function renderizarLista() {
    const container = document.getElementById('exerciseList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    
    let filtrados = ejercicios;
    if (filtroGrupo) {
      filtrados = filtrados.filter(e => e.grupo === filtroGrupo);
    }
    if (searchTerm) {
      filtrados = filtrados.filter(e => e.nombre.toLowerCase().includes(searchTerm));
    }

    if (filtrados.length === 0) {
      container.innerHTML = '<div class="empty-message">No hay ejercicios que coincidan</div>';
      return;
    }

    let html = '';
    filtrados.forEach(ej => {
      html += `
        <div class="exercise-item" data-id="${ej.id}">
          <div>
            <div class="exercise-name">${ej.nombre}</div>
            <div class="exercise-meta">${ej.grupo} · ${ej.nivel}</div>
          </div>
          <div class="exercise-actions">
            <button class="edit-exercise" data-id="${ej.id}" title="Editar">✏️</button>
            <button class="delete-exercise" data-id="${ej.id}" title="Eliminar">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // Eventos de editar/eliminar
    container.querySelectorAll('.edit-exercise').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        const ejercicio = ejercicios.find(e => e.id === id);
        if (ejercicio) abrirFormularioEdicion(ejercicio);
      });
    });
    container.querySelectorAll('.delete-exercise').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        mostrarConfirmacion('Eliminar ejercicio', '¿Estás seguro de eliminar este ejercicio?', () => {
          ejercicios = ejercicios.filter(e => e.id !== id);
          guardarEjercicios();
          actualizarFiltros();
          renderizarLista();
        });
      });
    });
  }

  // Actualizar filtros (grupos disponibles)
  function actualizarFiltros() {
    const grupos = [...new Set(ejercicios.map(e => e.grupo))].sort();
    const container = document.getElementById('filterOptions');
    if (grupos.length === 0) {
      container.innerHTML = '<span style="opacity:0.5; font-size:12px;">No hay grupos</span>';
      return;
    }
    let html = `<span class="filter-tag ${!filtroGrupo ? 'active' : ''}" data-grupo="">Todos</span>`;
    grupos.forEach(g => {
      html += `<span class="filter-tag ${filtroGrupo === g ? 'active' : ''}" data-grupo="${g}">${g}</span>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const grupo = this.dataset.grupo || null;
        filtroGrupo = grupo;
        // Actualizar clases activas
        container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderizarLista();
      });
    });
  }

  // Abrir formulario (nuevo o edición)
  function abrirFormularioEdicion(ejercicio = null) {

    fetch(`views/ejercicios/formularioejercicios.html`)
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el formulario');
        return res.text();
      })
      .then(html => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        // Rellenar si es edición
        if (ejercicio) {
          const nombreInput = wrapper.querySelector('#nombreEjercicio');
          const grupoSelect = wrapper.querySelector('#grupoEjercicio');
          const nivelSelect = wrapper.querySelector('#nivelEjercicio');
          const idInput = wrapper.querySelector('#idEjercicio');
          if (nombreInput) nombreInput.value = ejercicio.nombre;
          if (grupoSelect) grupoSelect.value = ejercicio.grupo;
          if (nivelSelect) nivelSelect.value = ejercicio.nivel;
          if (idInput) idInput.value = ejercicio.id;
        }

        // Mostrar modal con contenido
        mostrarModal({
          titulo: ejercicio ? 'Editar ejercicio' : 'Nuevo ejercicio',
          contenido: wrapper.innerHTML,
          botones: [] // no usamos botones del modal, los manejamos en el formulario
        });

        // Ahora el formulario está en el DOM, lo capturamos
        const form = document.getElementById('ejercicioForm');
        const cancelBtn = document.getElementById('formCancelar');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreEjercicio').value.trim();
            const grupo = document.getElementById('grupoEjercicio').value;
            const nivel = document.getElementById('nivelEjercicio').value;
            const id = document.getElementById('idEjercicio').value;
            if (!nombre) {
              mostrarAlerta('Error', 'El nombre es obligatorio');
              return;
            }
            const datos = { nombre, grupo, nivel };
            if (id) datos.id = parseInt(id);
            // Llamar a la función global para agregar/editar
            if (window.agregarEjercicio) {
              window.agregarEjercicio(datos);
            }
          });
        }
        if (cancelBtn) {
          cancelBtn.addEventListener('click', function() {
            // Cerrar modal
            const overlay = document.querySelector('.modal-overlay');
            if (overlay) {
              overlay.classList.remove('active');
              setTimeout(() => overlay.remove(), 200);
            }
          });
        }
      })
      .catch(err => {
        console.error(err);
        mostrarAlerta('Error', 'No se pudo cargar el formulario.');
      });
  }

  // Función global para añadir/editar (la usará el formulario)
  window.agregarEjercicio = function(datos) {
    if (datos.id) {
      // Edición
      const index = ejercicios.findIndex(e => e.id === datos.id);
      if (index !== -1) {
        ejercicios[index] = { ...ejercicios[index], ...datos };
      }
    } else {
      // Nuevo
      const nuevoId = ejercicios.length ? Math.max(...ejercicios.map(e => e.id)) + 1 : 1;
      ejercicios.push({ id: nuevoId, ...datos });
    }
    guardarEjercicios();
    actualizarFiltros();
    renderizarLista();
    // Cerrar modal (si existe)
    const modalOverlay = document.querySelector('.modal-overlay');
    if (modalOverlay) {
      modalOverlay.classList.remove('active');
      setTimeout(() => modalOverlay.remove(), 200);
    }
  };

  // Inicializar
  window.initEjercicios = function() {
    console.log('Inicializando Ejercicios');
    renderizarLista();
    actualizarFiltros();

    // Búsqueda
    document.getElementById('searchInput').addEventListener('input', renderizarLista);

    // Menú contextual
    const menuBtn = document.getElementById('ejerciciosMenuBtn');
    menuBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const opciones = [
        { label: '➕ Nuevo ejercicio', callback: () => abrirFormularioEdicion(null) },
        { label: '📥 Importar ejercicios', callback: () => {
            // Implementación simple: input file
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(ev) {
              const file = ev.target.files[0];
              if (!file) return;
              const reader = new FileReader();
              reader.onload = function(e) {
                try {
                  const imported = JSON.parse(e.target.result);
                  if (Array.isArray(imported)) {
                    ejercicios = imported;
                    guardarEjercicios();
                    actualizarFiltros();
                    renderizarLista();
                    mostrarAlerta('Éxito', 'Ejercicios importados correctamente');
                  } else {
                    mostrarAlerta('Error', 'El archivo no tiene un formato válido');
                  }
                } catch(err) {
                  mostrarAlerta('Error', 'No se pudo leer el archivo');
                }
              };
              reader.readAsText(file);
            };
            input.click();
          }
        },
        { label: '📤 Exportar ejercicios', callback: () => {
            const data = JSON.stringify(ejercicios);
            const blob = new Blob([data], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'ejercicios.json';
            a.click();
            URL.revokeObjectURL(url);
          }
        },
        { label: '🗑️ Borrar todos', callback: () => {
            mostrarConfirmacion('Borrar todos', '¿Eliminar todos los ejercicios?', () => {
              ejercicios = [];
              guardarEjercicios();
              actualizarFiltros();
              renderizarLista();
            });
          }
        }
      ];
      mostrarMenuContextual(opciones, e);
    });
  };
</script>
