<style>
/* Degradados superior e inferior fijos */
.scroll-fade-top, .scroll-fade-bottom {
  position: fixed;
  left: 0;
  right: 0;
  height: 70px;        /* Ajusta según prefieras 50px*/
  pointer-events: none; /* Para que no interfieran con clics */
  z-index: 4;           /* Justo debajo del header sticky (z-index:5) */
}
.scroll-fade-top {
  top: 0;
  background: linear-gradient(to bottom, #f5edd8 50%, transparent);
  /* background: linear-gradient(to bottom, #f5edd8, transparent); */
}
.scroll-fade-bottom {
  bottom: 0px;         /* Deja espacio para el navbar inferior (ajusta según tu navbar) */
  background: linear-gradient(to top, #f5edd8 50%, transparent);
}
  
  .card {
    background-color: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    border-radius: var(--card-radius);
    width: 100%;
    padding: 12px;
    box-sizing: border-box;
    box-shadow: 0 var(--shadow-offset) 0 var(--text-dark);
    position: relative;
  }
  /* ===== Header fijo al hacer scroll ===== */
  .profile-card {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    position: sticky;
    top: 10px;
    z-index: 5;
    background-color: var(--bg-card); /* Para que no se vea transparente al solaparse */
  }
  .profile-inner {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
    flex: 1;
    justify-content: space-between;
  }
  .avatar-pixel {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 3px 0 var(--text-dark);
    font-size: 24px;
  }
  .profile-info {
    min-width: 0;
    padding-top: 2px;
  }
  .profile-name-large {
    font-size: 20px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -0.5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.2;
  }
  .settings-btn {
    width: 46px;
    height: 46px;
    background-color: #dfd7c2;
    border: var(--border-width) solid var(--text-dark);
    border-radius: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    box-shadow: 0 3px 0 var(--text-dark);
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .settings-btn:active {
    transform: scale(0.95);
  }
  
  /* Búsqueda + Filtro (en la misma fila) */
  .search-wrapper {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
  }
  .search-input-wrap {
    position: relative;
    flex: 1;
    border-bottom: 1px solid rgba(43,37,31,0.2);
  }
  .search-input {
    width: 100%;
    padding: 8px 36px 8px 12px;
    border: 0px solid rgba(43,37,31,0.2);
    background: #ffffff00;
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    box-sizing: border-box;
    box-shadow: 0 0px 0 var(--text-dark);
    outline: none;
  }
  .search-input:focus {
    box-shadow: 0 3px 0 var(--accent-orange);
    border-color: var(--accent-orange);
  }
  .search-clear {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-dark);
    opacity: 0.6;
    padding: 0;
    display: none;
    line-height: 1;
  }
  .search-clear.visible {
    display: block;
  }
  .search-clear:hover {
    opacity: 1;
  }

  .filter-toggle {
    background: #ffffff00;
    border: 0px solid rgba(43,37,31,0.2);
    padding: 0px 0px;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 26px;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.1s;
    flex-shrink: 0;
  }
  .filter-toggle:active {
    transform: scale(0.95);
    color: #dda40d;
  }
  
  .filter-toggle.active {
    /*background: var(--text-dark);
    color: var(--bg-card);*/
    color: #dda40d;
  }

  .filter-summary-hidden {
    display: none;
  }

  #filterDetails {
    margin-top: 6px;
  }
  details[open] .filter-summary::before {
    transform: rotate(90deg);
  }
  .filter-options {
    padding: 10px 0;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .filter-tag {
    background: var(--bg-card);
    border: 1.5px solid var(--text-dark);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.1s;
  }
  .filter-tag.active {
    background: var(--text-dark);
    color: var(--bg-card);
  }
  
  
  
  
  .exercise-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid rgba(43,37,31,0.1);
  }
  .exercise-item:last-child {
    border-bottom: none;
  }
  .exercise-name {
    font-weight: 700;
    font-size: 15px;
  }
  .exercise-meta {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 2px;
  }
  .exercise-actions button {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    opacity: 0.5;
    transition: opacity 0.1s;
  }
  .exercise-actions button:hover {
    opacity: 1;
  }
  .empty-message {
    text-align: center;
    opacity: 0.5;
    padding: 30px 0;
    font-size: 14px;
  }
  .menu-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    padding: 4px 8px;
    border-radius: 10px;
    background: var(--bg-card);
    border: var(--border-width) solid var(--text-dark);
    box-shadow: 0 3px 0 var(--text-dark);
    line-height: 1;
  }
  .menu-btn:active {
    transform: scale(0.95);
  }
</style>

<!-- Degradados de scroll -->
<div class="scroll-fade-top"></div>
<div class="scroll-fade-bottom"></div>

<!-- Header -->
<div class="card profile-card">
  <div class="profile-inner">
    <div class="avatar-pixel">🏋️</div>
    <div class="profile-info">
      <h2 class="profile-name-large">Ejercicios</h2>
    </div>
    <button class="settings-btn" id="settingsBtnLifebar">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5" stroke-linejoin="miter">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
  </div>
</div>

<!-- Búsqueda + Filtro (en la misma fila) -->
<div class="card">
  <div class="search-wrapper">
    <div class="search-input-wrap">
      <input type="text" class="search-input" id="searchInput" placeholder="Buscar ejercicio...">
      <button class="search-clear" id="searchClear" aria-label="Borrar texto">✕</button>
    </div>
    <button class="filter-toggle" id="filterToggle">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="24" height="24" fill="currentColor">
        <path d="M96 128C83.1 128 71.4 135.8 66.4 147.8C61.4 159.8 64.2 173.5 73.4 182.6L256 365.3L256 480C256 488.5 259.4 496.6 265.4 502.6L329.4 566.6C338.6 575.8 352.3 578.5 364.3 573.5C376.3 568.5 384 556.9 384 544L384 365.3L566.6 182.7C575.8 173.5 578.5 159.8 573.5 147.8C568.5 135.8 556.9 128 544 128L96 128z"/>
      </svg>
    </button>
  </div>
  <details id="filterDetails">
    <summary class="filter-summary-hidden"></summary>
    <div class="filter-options" id="filterOptions">
    </div>
  </details>
</div>

<div class="section-label">Lista ejercicios</div>

<!-- Lista de ejercicios -->
<div class="card" style="padding-bottom: 8px;">
  <div id="exerciseList">
  </div>
</div>

<script>
  // Datos iniciales (ejemplo)
  let ejercicios = [
    { id: 1, nombre: "Press de banca", grupo: "Pecho", nivel: "Intermedio" },
    { id: 2, nombre: "Sentadilla", grupo: "Pierna", nivel: "Avanzado" },
    { id: 3, nombre: "Remo con barra", grupo: "Espalda", nivel: "Intermedio" },
    { id: 4, nombre: "Curl de bíceps", grupo: "Brazos", nivel: "Principiante" },
    { id: 5, nombre: "Fondos en paralelas", grupo: "Pecho", nivel: "Avanzado" },
    { id: 6, nombre: "Peso muerto", grupo: "Pierna", nivel: "Avanzado" },
  ];

  // Cargar desde localStorage si existe
  const stored = localStorage.getItem('ejercicios');
  if (stored) {
    try {
      ejercicios = JSON.parse(stored);
    } catch(e) {}
  }

  let filtroGrupo = null; // null = todos

  function guardarEjercicios() {
    localStorage.setItem('ejercicios', JSON.stringify(ejercicios));
  }

  // Renderizar lista
  function renderizarLista() {
    const container = document.getElementById('exerciseList');
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    
    let filtrados = ejercicios;
    if (filtroGrupo) {
      filtrados = filtrados.filter(e => e.grupo === filtroGrupo);
    }
    if (searchTerm) {
      filtrados = filtrados.filter(e => e.nombre.toLowerCase().includes(searchTerm));
    }

    if (filtrados.length === 0) {
      container.innerHTML = '<div class="empty-message">No hay ejercicios que coincidan</div>';
      return;
    }

    let html = '';
    filtrados.forEach(ej => {
      html += `
        <div class="exercise-item" data-id="${ej.id}">
          <div>
            <div class="exercise-name">${ej.nombre}</div>
            <div class="exercise-meta">${ej.grupo} · ${ej.nivel}</div>
          </div>
          <div class="exercise-actions">
            <button class="edit-exercise" data-id="${ej.id}" title="Editar">✏️</button>
            <button class="delete-exercise" data-id="${ej.id}" title="Eliminar">🗑️</button>
          </div>
        </div>
      `;
    });
    container.innerHTML = html;

    // Eventos de editar/eliminar
    container.querySelectorAll('.edit-exercise').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        const ejercicio = ejercicios.find(e => e.id === id);
        if (ejercicio) abrirFormularioEdicion(ejercicio);
      });
    });
    container.querySelectorAll('.delete-exercise').forEach(btn => {
      btn.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        mostrarConfirmacion('Eliminar ejercicio', '¿Estás seguro de eliminar este ejercicio?', () => {
          ejercicios = ejercicios.filter(e => e.id !== id);
          guardarEjercicios();
          actualizarFiltros();
          renderizarLista();
        });
      });
    });
  }

  // Actualizar filtros (grupos disponibles)
  function actualizarFiltros() {
    const grupos = [...new Set(ejercicios.map(e => e.grupo))].sort();
    const container = document.getElementById('filterOptions');
    if (grupos.length === 0) {
      container.innerHTML = '<span style="opacity:0.5; font-size:12px;">No hay grupos</span>';
      return;
    }
    let html = `<span class="filter-tag ${!filtroGrupo ? 'active' : ''}" data-grupo="">Todos</span>`;
    grupos.forEach(g => {
      html += `<span class="filter-tag ${filtroGrupo === g ? 'active' : ''}" data-grupo="${g}">${g}</span>`;
    });
    container.innerHTML = html;

    container.querySelectorAll('.filter-tag').forEach(tag => {
      tag.addEventListener('click', function() {
        const grupo = this.dataset.grupo || null;
        filtroGrupo = grupo;
        container.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderizarLista();
      });
    });
  }

  // Abrir formulario (nuevo o edición)
  function abrirFormularioEdicion(ejercicio = null) {
    fetch(`views/ejercicios/formularioejercicios.html`)
      .then(res => {
        if (!res.ok) throw new Error('No se pudo cargar el formulario');
        return res.text();
      })
      .then(html => {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = html;
        if (ejercicio) {
          const nombreInput = wrapper.querySelector('#nombreEjercicio');
          const grupoSelect = wrapper.querySelector('#grupoEjercicio');
          const nivelSelect = wrapper.querySelector('#nivelEjercicio');
          const idInput = wrapper.querySelector('#idEjercicio');
          if (nombreInput) nombreInput.value = ejercicio.nombre;
          if (grupoSelect) grupoSelect.value = ejercicio.grupo;
          if (nivelSelect) nivelSelect.value = ejercicio.nivel;
          if (idInput) idInput.value = ejercicio.id;
        }

        mostrarModal({
          titulo: ejercicio ? 'Editar ejercicio' : 'Nuevo ejercicio',
          contenido: wrapper.innerHTML,
          botones: []
        });

        const form = document.getElementById('ejercicioForm');
        const cancelBtn = document.getElementById('formCancelar');
        if (form) {
          form.addEventListener('submit', function(e) {
            e.preventDefault();
            const nombre = document.getElementById('nombreEjercicio').value.trim();
            const grupo = document.getElementById('grupoEjercicio').value;
            const nivel = document.getElementById('nivelEjercicio').value;
            const id = document.getElementById('idEjercicio').value;
            if (!nombre) {
              mostrarAlerta('Error', 'El nombre es obligatorio');
              return;
            }
            const datos = { nombre, grupo, nivel };
            if (id) datos.id = parseInt(id);
            if (window.agregarEjercicio) {
              window.agregarEjercicio(datos);
            }
          });
        }
        if (cancelBtn) {
          cancelBtn.addEventListener('click', function() {
            const overlay = document.querySelector('.modal-overlay');
            if (overlay) {
              overlay.classList.remove('active');
              setTimeout(() => overlay.remove(), 200);
            }
          });
        }
      })
      .catch(err => {
        console.error(err);
        mostrarAlerta('Error', 'No se pudo cargar el formulario.');
      });
  }

  // Función global para añadir/editar (la usará el formulario)
  window.agregarEjercicio = function(datos) {
    if (datos.id) {
      const index = ejercicios.findIndex(e => e.id === datos.id);
      if (index !== -1) {
        ejercicios[index] = { ...ejercicios[index], ...datos };
      }
    } else {
      const nuevoId = ejercicios.length ? Math.max(...ejercicios.map(e => e.id)) + 1 : 1;
      ejercicios.push({ id: nuevoId, ...datos });
    }
    guardarEjercicios();
    actualizarFiltros();
    renderizarLista();
    const modalOverlay = document.querySelector('.modal-overlay');
    if (modalOverlay) {
      modalOverlay.classList.remove('active');
      setTimeout(() => modalOverlay.remove(), 200);
    }
  };

  // ===== INICIALIZACIÓN =====
  window.initEjercicios = function() {
    console.log('Inicializando Ejercicios');
    renderizarLista();
    actualizarFiltros();

    const searchInput = document.getElementById('searchInput');
    const searchClear = document.getElementById('searchClear');
    const filterToggle = document.getElementById('filterToggle');
    const filterDetails = document.getElementById('filterDetails');

    // Mostrar/ocultar X al escribir
    function toggleClearButton() {
      if (searchInput.value.length > 0) {
        searchClear.classList.add('visible');
      } else {
        searchClear.classList.remove('visible');
      }
    }
    searchInput.addEventListener('input', function() {
      renderizarLista();
      toggleClearButton();
    });
    searchClear.addEventListener('click', function() {
      searchInput.value = '';
      renderizarLista();
      toggleClearButton();
      searchInput.focus();
    });
    toggleClearButton();

    // Toggle del filtro
    filterToggle.addEventListener('click', function() {
      if (filterDetails.hasAttribute('open')) {
        filterDetails.removeAttribute('open');
        filterToggle.classList.remove('active');
      } else {
        filterDetails.setAttribute('open', '');
        filterToggle.classList.add('active');
      }
    });

    // ===== NUEVO: Botón de ajustes con cambio de icono y scroll =====
    const settingsBtn = document.getElementById('settingsBtnLifebar');
    let isAtTop = true;

    function updateButtonIcon() {
      const isScrolled = window.scrollY > 10;
      if (isScrolled && isAtTop) {
        // Cambiar a flecha hacia arriba
        settingsBtn.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
        isAtTop = false;
      } else if (!isScrolled && !isAtTop) {
        // Restaurar engranaje
        settingsBtn.innerHTML = `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="var(--text-dark)" stroke-width="2.5" stroke-linejoin="miter"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`;
        isAtTop = true;
      }
    }

    window.addEventListener('scroll', updateButtonIcon);
    updateButtonIcon(); // estado inicial

    // Click condicional: menú contextual si está arriba, scroll al inicio si está abajo
    settingsBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (isAtTop) {
        // Mostrar menú contextual (solo dos opciones)
        const opciones = [
          { label: '➕ Nuevo ejercicio', callback: () => abrirFormularioEdicion(null) },
          { label: '🗑️ Borrar todos', callback: () => {
              mostrarConfirmacion('Borrar todos', '¿Eliminar todos los ejercicios?', () => {
                ejercicios = [];
                guardarEjercicios();
                actualizarFiltros();
                renderizarLista();
              });
            }
          }
        ];
        mostrarMenuContextual(opciones, e);
      } else {
        // Scroll suave al inicio
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  };
</script>
