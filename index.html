<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Estilo RPG - SPA</title>

  <!-- ===== FUENTES LOCALES (compartidas) ===== -->
  <style>
    @font-face {
      font-family: 'Space Mono';
      src: url('fonts/SpaceMono-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('fonts/SpaceMono-Italic.ttf') format('truetype');
      font-weight: 400;
      font-style: italic;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('fonts/SpaceMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }
    @font-face {
      font-family: 'Space Mono';
      src: url('fonts/SpaceMono-BoldItalic.ttf') format('truetype');
      font-weight: 700;
      font-style: italic;
    }

    /* ===== VARIABLES Y ESTILOS GLOBALES ===== */
    :root {
      --bg-main: #f5edd8;
      --bg-card: #fffbf4;
      --text-dark: #2b251f;
      --accent-green: #387a5c;
      --accent-green-light: #e3f4ec;
      --accent-orange: #e06d53;
      --accent-yellow: #e5a93c;
      --accent-blue: #7da5d9;
      --accent-shopping: #71b48d;
      --bar-empty: #eadecc;
      --border-width: 2.5px;
      --card-radius: 24px;
      --shadow-offset: 4px;
    }

    body {
      background-color: var(--bg-main);
      font-family: 'Space Mono', monospace;
      color: var(--text-dark);
      margin: 0;
      padding: 20px 20px 100px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-height: 100vh;
      box-sizing: border-box;
      /* Deshabilitar selección de texto */
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }
    
    /* Habilitar selección de texto */
    input, textarea, [contenteditable="true"] {
      user-select: text;
      -webkit-user-select: text;
    }

    .section-label {
      width: 100%;
      max-width: 380px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.6;
      margin: 10px 0 -5px 0;
    }

    /* ===== BOTTOM NAVBAR ===== */
    .bottom-navbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background-color: var(--bg-card);
      border: var(--border-width) solid var(--text-dark);
      border-radius: 18px;
      width: calc(100% - 40px);
      max-width: 360px;
      display: flex;
      padding: 2px;
      box-sizing: border-box;
      box-shadow: 0 4px 0 var(--text-dark);
      z-index: 10;
    }
    .nav-item {
      flex: 1;
      text-align: center;
    /*padding: 10px 0;*/
      padding: 6px 0;
    /*font-size: 14px;*/
      font-size: 8px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    /*gap: 6px;*/
      gap: 4px;
      color: var(--text-dark);
      transition: background 0.1s;
    }
    .nav-item.active {
      background-color: var(--text-dark);
      color: var(--bg-card);
    }

    /* Iconos SVG dentro de nav-item */
    .nav-item svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    /* El label de texto */
    .nav-label {
      display: inline;
    }

    /* ===== RESPONSIVE: ocultar texto en pantallas muy estrechas ===== */
    @media (max-width: 350px) {
      .nav-item {
        padding: 6px 2px;
        gap: 0;
      }
      .nav-label {
        display: none;
      }
      .nav-item svg {
        width: 26px;
        height: 26px;
      }
    }
    
    /* ===== CONTENEDOR PRINCIPAL ===== */
    #main-content {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* Mensaje de carga */
    .cargando {
      text-align: center;
      opacity: 0.5;
      font-size: 16px;
      padding: 40px 0;
    }
  </style>
</head>
<body>

  </div>

  <!-- SCRIPTS (siempre los mismos) -->
  <script src="js/menu-contextual.js"></script>
  <script src="js/modal-alerts.js"></script>

  <!-- LÓGICA DE CARGA -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {

      const contenedor = document.getElementById('main-content');
      const navItems = document.querySelectorAll('.nav-item');

      function cargarVista(nombre) {
        contenedor.innerHTML = '<div class="cargando">Cargando...</div>';

        const basePath = `${nombre}`;
        const rutas = {
          hoy: `views/${basePath}/${nombre}.html`,
          rutinas: `views/${basePath}/${nombre}.html`,
          ejercicios: `views/${basePath}/${nombre}.html`,
          historial: `views/${basePath}/${nombre}.html`,
          timeline: `views/${nombre}.html`
        };
        
        fetch(rutas[nombre])
          .then(res => {
            if (!res.ok) throw new Error(`No se pudo cargar ${nombre}.html`);
            return res.text();
          })
          .then(html => {
            // Inyectar el HTML
            contenedor.innerHTML = html;

            // Ejecutar scripts de la vista de forma síncrona
            const scripts = contenedor.querySelectorAll('script');
            scripts.forEach(script => {
              if (script.src) {
                // Script externo - cargar dinámicamente (raro en vistas)
                const newScript = document.createElement('script');
                newScript.src = script.src;
                document.head.appendChild(newScript);
              } else {
                // Ejecutar inline con eval en el ámbito global
                try {
                  Function(script.textContent)();
                } catch (e) {
                  console.error('Error ejecutando script de vista:', e);
                }
              }
              // Eliminar el script del DOM para limpiar
              script.remove();
            });

            // Llamar a la función de inicialización específica de la vista
            const initFn = window[`init${nombre.charAt(0).toUpperCase() + nombre.slice(1)}`];
            if (typeof initFn === 'function') {
              // Pequeño retraso para asegurar que el DOM se ha actualizado
              setTimeout(initFn, 0);
            } else {
              console.warn(`No se encontró init${nombre}`);
            }

            // Actualizar barra de navegación
            navItems.forEach(item => {
              item.classList.toggle('active', item.dataset.view === nombre);
            });

          })
          .catch(err => {
            console.error(err);
            contenedor.innerHTML = `<p style="color:red; text-align:center;">Error al cargar ${nombre}</p>`;
          });
      }

      navItems.forEach(item => {
        item.addEventListener('click', function() {
          const vista = this.dataset.view;
          if (vista) cargarVista(vista);
        });
      });

      // Cargar vista inicial
      cargarVista('hoy');

    });
  </script>

</html>
